<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>저장공간 관리 - 하이탑 AI 업무센터</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
:root{--bg:#071625;--panel:#101f32;--card:#172b42;--card2:#1b324c;--line:#294057;--line2:#35516c;--txt:#f5f8fb;--sub:#b4c2d2;--muted:#8193a8;--gold:#d8b84a;--gold2:rgba(216,184,74,.13);--blue:#5f9fd8;--blue2:rgba(95,159,216,.14);--danger:#ff8585}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0a1f35 0%,var(--bg) 48%,#06131f 100%);color:var(--txt);font-family:Pretendard,"Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;overflow-x:hidden}
button{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
.shell{width:min(900px,calc(100% - 48px));margin:auto;padding:14px 0 32px;display:flex;flex-direction:column;gap:16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;padding:10px 0 14px;border-bottom:1px solid rgba(201,168,76,.2)}
.brand{display:flex;gap:12px;align-items:center;min-width:0}
h1{margin:0;font-size:20px}
.sub{font-size:12.5px;color:var(--sub);margin-top:3px}
.btn{border:1px solid var(--line2);border-radius:10px;background:rgba(255,255,255,.025);color:var(--sub);font-weight:700;cursor:pointer;transition:border-color .15s,background .15s,color .15s;min-height:34px;padding:0 12px;font-size:12.5px;display:inline-flex;align-items:center}
.btn:hover{border-color:var(--blue);color:var(--txt);background:var(--blue2)}

.loading,.err{text-align:center;color:var(--muted);font-size:13px;padding:30px 0}
.err{color:#fca5a5}

.stat-row{display:flex;gap:14px;flex-wrap:wrap}
.stat-card{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:-.4px}
.stat-unit{font-size:14px;font-weight:700;color:var(--sub);margin-left:3px}

.section{background:linear-gradient(180deg,rgba(16,31,50,.96),#0f1d2f);border:1px solid rgba(53,81,108,.86);border-radius:14px;padding:18px 20px}
.section-title{font-size:13.5px;font-weight:800;color:var(--gold);margin-bottom:14px}

.donut-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut-wrap{width:180px;height:180px;flex-shrink:0;margin:0 auto;position:relative}
.legend{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;flex:1;min-width:220px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px}
.legend-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.legend-name{color:var(--txt);font-weight:700;flex-shrink:0}
.legend-meta{color:var(--muted);font-variant-numeric:tabular-nums;margin-left:auto;padding-left:8px;text-align:right;white-space:nowrap}
@media(max-width:480px){.donut-row{flex-direction:column;align-items:stretch}.legend-meta{margin-left:0;text-align:left}}

.bar-wrap{width:100%}
.more-btn{margin-top:14px;padding:7px 14px;border-radius:18px;font-size:12px;font-weight:700;background:var(--card2);border:1px solid var(--line);color:var(--sub);cursor:pointer;transition:all .15s ease}
.more-btn:hover{background:#243c5a;color:var(--txt)}
.table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px}
.table th,.table td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
.table th{color:var(--muted);font-weight:700;font-size:12px}
.table td:not(:first-child),.table th:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.table tbody tr:last-child td{border-bottom:none}

.footer{text-align:center;color:var(--muted);font-size:12px;padding-top:4px}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="brand">
      <a class="btn" href="./index.html">← 업무센터</a>
      <div>
        <h1>💾 저장공간 관리</h1>
        <div class="sub">버킷별 파일 사용량 · DB 테이블 용량</div>
      </div>
    </div>
  </header>

  <div id="loading" class="loading">불러오는 중...</div>
  <div id="err" class="err" style="display:none"></div>

  <div id="content" style="display:none;flex-direction:column;gap:16px">
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">총 파일 개수</div>
        <div class="stat-value" id="statFiles">-<span class="stat-unit">개</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">총 저장 용량</div>
        <div class="stat-value" id="statBytes">-</div>
      </div>
    </div>

    <section class="section">
      <div class="section-title" id="storageTitle">저장공간 (Storage)</div>
      <div class="donut-row">
        <div class="donut-wrap"><canvas id="donutChart"></canvas></div>
        <ul class="legend" id="legend"></ul>
      </div>
    </section>

    <section class="section">
      <div class="section-title">DB 테이블 용량 (public 스키마)</div>
      <div class="bar-wrap"><canvas id="barChart"></canvas></div>
      <button type="button" class="more-btn" id="moreBtn" style="display:none"></button>
      <table class="table" id="moreTable" style="display:none">
        <thead><tr><th>테이블</th><th>용량</th></tr></thead>
        <tbody id="moreTableBody"></tbody>
      </table>
    </section>
  </div>

  <footer class="footer">하이탑부동산 · 031-949-8969</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<script>
(function(){
'use strict';

var SUPABASE_URL = 'https://xaxbkdnrzsghsabkdvzj.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_gqNFRMHb6yYKvqFnQurPKQ_7gGhURVd';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// dataviz 스킬 validator로 이 페이지의 실제 카드 배경(#172b42, 다크 네이비)에 대해
// 검증 통과한 4색(파랑/주황/아쿠아/노랑, 카테고리컬 순서 고정 — 임의로 섞지 않는다).
var DONUT_COLORS = ['#3987e5', '#d95926', '#199e70', '#c98500'];
var DONUT_OVERFLOW_COLOR = '#5b6b8c';
var DONUT_ZERO_COLOR = '#33406b';
// DB 테이블 막대는 크기(magnitude) 하나만 보여주는 단일 시리즈라 카테고리컬이 아닌
// sequential 블루 한 톤만 쓴다.
var BAR_COLOR = '#3987e5';
var TABLE_TOP_N = 10;

function formatBytes(bytes) {
  var n = Number(bytes) || 0;
  if (n < 1024) return n + ' B';
  var units = ['KB', 'MB', 'GB', 'TB'];
  var value = n, unitIndex = -1;
  do {
    value /= 1024;
    unitIndex += 1;
  } while (value >= 1024 && unitIndex < units.length - 1);
  return value.toFixed(1) + ' ' + units[unitIndex];
}

// 막대 끝에 용량을 직접 라벨로 그린다 — 마우스오버 없이도 값을 읽을 수 있게.
var barValueLabelPlugin = {
  id: 'barValueLabels',
  afterDatasetsDraw: function (chart) {
    var ctx = chart.ctx;
    var meta = chart.getDatasetMeta(0);
    var labels = (chart.data.datasets[0] && chart.data.datasets[0].prettyLabels) || [];
    meta.data.forEach(function (bar, index) {
      ctx.save();
      ctx.fillStyle = 'rgba(245, 248, 251, 0.85)';
      ctx.font = '11px system-ui, -apple-system, "Segoe UI", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(labels[index] || '', bar.x + 6, bar.y);
      ctx.restore();
    });
  },
};

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  var errEl = document.getElementById('err');
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function render(buckets, tables) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'flex';

  var totalBytes = buckets.reduce(function (sum, b) { return sum + Number(b.total_bytes || 0); }, 0);
  var totalFiles = buckets.reduce(function (sum, b) { return sum + Number(b.file_count || 0); }, 0);

  document.getElementById('statFiles').innerHTML = totalFiles.toLocaleString() + '<span class="stat-unit">개</span>';
  document.getElementById('statBytes').textContent = formatBytes(totalBytes);
  document.getElementById('storageTitle').textContent =
    '저장공간 (Storage) — 총 ' + totalFiles.toLocaleString() + '개 파일 · ' + formatBytes(totalBytes);

  var sortedBuckets = buckets.slice().sort(function (a, b) { return Number(b.total_bytes || 0) - Number(a.total_bytes || 0); });
  var nonZeroBuckets = sortedBuckets.filter(function (b) { return Number(b.total_bytes) > 0; });

  function bucketColorOf(bucketId) {
    var i = nonZeroBuckets.findIndex(function (b) { return b.bucket_id === bucketId; });
    if (i === -1) return DONUT_ZERO_COLOR;
    return DONUT_COLORS[i] || DONUT_OVERFLOW_COLOR;
  }

  // 범례 (0B 버킷도 표시하되 차트에는 안 그림)
  var legendEl = document.getElementById('legend');
  legendEl.innerHTML = sortedBuckets.map(function (b) {
    return '<li class="legend-item">' +
      '<span class="legend-swatch" style="background:' + bucketColorOf(b.bucket_id) + '"></span>' +
      '<span class="legend-name">' + b.bucket_id + '</span>' +
      '<span class="legend-meta">' + formatBytes(b.total_bytes) + ' · ' + Number(b.file_count).toLocaleString() + '개</span>' +
      '</li>';
  }).join('');

  new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: nonZeroBuckets.map(function (b) { return b.bucket_id; }),
      datasets: [{
        data: nonZeroBuckets.map(function (b) { return Number(b.total_bytes); }),
        backgroundColor: nonZeroBuckets.map(function (b) { return bucketColorOf(b.bucket_id); }),
        borderColor: '#172b42',
        borderWidth: 2,
        hoverOffset: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0a1530',
          borderColor: 'rgba(255,255,255,0.12)',
          borderWidth: 1,
          titleColor: '#f5f8fb',
          bodyColor: '#f5f8fb',
          padding: 10,
          callbacks: {
            label: function (ctx) {
              var value = Number(ctx.raw);
              var pct = totalBytes > 0 ? ((value / totalBytes) * 100).toFixed(1) : '0.0';
              return formatBytes(value) + ' (' + pct + '%)';
            },
          },
        },
      },
    },
  });

  // DB 테이블 막대그래프 (상위 10개, 큰 순 정렬) + 더보기 토글
  var sortedTables = tables.slice().sort(function (a, b) { return Number(b.total_bytes || 0) - Number(a.total_bytes || 0); });
  var topTables = sortedTables.slice(0, TABLE_TOP_N);
  var restTables = sortedTables.slice(TABLE_TOP_N);

  var barCanvas = document.getElementById('barChart');
  barCanvas.parentElement.style.height = Math.max(topTables.length * 30, 60) + 'px';

  new Chart(barCanvas, {
    type: 'bar',
    data: {
      labels: topTables.map(function (t) { return t.table_name; }),
      datasets: [{
        data: topTables.map(function (t) { return Number(t.total_bytes); }),
        prettyLabels: topTables.map(function (t) { return t.pretty_size; }),
        backgroundColor: BAR_COLOR,
        borderRadius: 4,
        barThickness: 16,
      }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { right: 56 } },
      scales: {
        x: { display: false, grid: { display: false } },
        y: { grid: { display: false }, ticks: { color: 'rgba(180, 194, 210, 0.9)', font: { size: 12 } } },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0a1530',
          borderColor: 'rgba(255,255,255,0.12)',
          borderWidth: 1,
          titleColor: '#f5f8fb',
          bodyColor: '#f5f8fb',
          padding: 10,
          callbacks: {
            label: function (ctx) { return (topTables[ctx.dataIndex] && topTables[ctx.dataIndex].pretty_size) || ''; },
          },
        },
      },
    },
    plugins: [barValueLabelPlugin],
  });

  if (restTables.length > 0) {
    var moreBtn = document.getElementById('moreBtn');
    var moreTable = document.getElementById('moreTable');
    var moreTableBody = document.getElementById('moreTableBody');
    var expanded = false;

    moreTableBody.innerHTML = restTables.map(function (t) {
      return '<tr><td>' + t.table_name + '</td><td>' + t.pretty_size + '</td></tr>';
    }).join('');

    moreBtn.textContent = '더보기 (' + restTables.length + '개)';
    moreBtn.style.display = 'inline-flex';
    moreBtn.onclick = function () {
      expanded = !expanded;
      moreTable.style.display = expanded ? 'table' : 'none';
      moreBtn.textContent = expanded ? '접기' : '더보기 (' + restTables.length + '개)';
    };
  }
}

async function run() {
  try {
    var storageRes = await supabase.rpc('get_storage_usage');
    var dbRes = await supabase.rpc('get_db_table_sizes');
    if (storageRes.error) throw storageRes.error;
    if (dbRes.error) throw dbRes.error;
    render(storageRes.data || [], dbRes.data || []);
  } catch (e) {
    showError('일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
}

run();
})();
</script>
</body>
</html>
