<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>업무일지</title>
<style>
:root{
  --bg:#071024; --panel:#101b34; --panel2:#16264d;
  --gold:#d6ad35; --gold2:#ffd75a; --text:#f8fafc; --muted:#aab7d4;
  --line:rgba(214,173,53,.42); --white:#fff; --ink:#172033;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;background:linear-gradient(180deg,#101b34,#071024 45%,#050914);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:34px 0 60px}
.header{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:26px}
.logo{display:flex;align-items:center;gap:14px}
.logo-mark{width:52px;height:52px;border:1px solid var(--line);border-radius:16px;display:grid;place-items:center;color:var(--gold2);font-weight:900;background:rgba(214,173,53,.12)}
h1{margin:0;font-size:30px;letter-spacing:-1px}
.sub{margin-top:6px;color:var(--muted);font-size:14px}
.btn{border:1px solid var(--line);border-radius:999px;background:#0b142c;color:var(--text);padding:10px 14px;font-weight:800;cursor:pointer}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border:0}
.hero{background:linear-gradient(145deg,#182544,#0d1831);border:1px solid var(--line);border-radius:26px;padding:28px;margin-bottom:26px;box-shadow:0 24px 70px rgba(0,0,0,.25)}
.hero h2{margin:0 0 10px;font-size:32px;letter-spacing:-1px}
.hero p{margin:0;color:var(--muted);line-height:1.7}
.section-title{margin:28px 0 14px;font-size:18px;color:var(--gold2)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.card{min-height:155px;border:1px solid rgba(214,173,53,.28);border-radius:22px;background:linear-gradient(145deg,#16264d,#0b1630);padding:20px;display:flex;flex-direction:column;justify-content:space-between;transition:.2s}
.card:hover{transform:translateY(-3px);border-color:var(--gold2);box-shadow:0 24px 60px rgba(0,0,0,.3)}
.icon{font-size:26px;margin-bottom:14px}
.card h3{margin:0;font-size:20px}
.card p{margin:8px 0 0;color:var(--muted);font-size:13.5px;line-height:1.5}
.go{color:var(--gold2);font-weight:900;font-size:13px;margin-top:18px}
.panel{background:#fff;color:var(--ink);border-radius:24px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.24);border:1px solid #dce5f5}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
label{font-size:13px;font-weight:900;color:#41506c;display:block;margin-bottom:7px}
input,select,textarea{width:100%;border:1px solid #ccd7ec;border-radius:12px;padding:13px 14px;font-size:15px;outline:none;background:#f7f9fd}
textarea{min-height:120px;resize:vertical}
.result{margin-top:20px;background:linear-gradient(145deg,#101b34,#16264d);color:white;border-radius:20px;padding:22px;border:1px solid var(--line)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
.kpi{background:rgba(255,255,255,.08);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.12)}
.kpi small{color:#b8c5df;font-weight:800}
.kpi strong{display:block;margin-top:7px;font-size:20px;color:var(--gold2)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.footer{margin-top:30px;border-top:1px solid var(--line);padding-top:18px;color:var(--muted);font-size:13px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.form-grid,.kpis{grid-template-columns:1fr}.header{align-items:flex-start;flex-direction:column}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.wrap{width:calc(100% - 22px);padding-top:22px}h1{font-size:24px}.hero h2{font-size:24px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <a class="logo" href="../index.html">
      <div class="logo-mark">HT</div>
      <div>
        <h1>업무일지</h1>
        <div class="sub">하이탑 AI 부동산 업무센터</div>
      </div>
    </a>
    <a class="btn" href="../index.html">대시보드</a>
  </header>

<section class="panel">
  <h2 style="margin-top:0;color:#101d3d">업무일지</h2>
  <div class="form-grid">
    <div><label>날짜</label><input id="date" type="date"></div>
    <div><label>작성자</label><select id="writer"><option>주현희</option><option>김정현</option></select></div>
    <div><label>업무구분</label><select id="kind"><option>상담</option><option>방문</option><option>계약</option><option>광고</option></select></div>
    <div><label>고객명</label><input id="name"></div>
    <div><label>매물명</label><input id="property"></div>
    <div style="grid-column:1/-1"><label>상담내용 / 다음 할 일</label><textarea id="memo"></textarea></div>
  </div>
  <div class="actions"><button class="btn gold" onclick="save()">저장</button><button class="btn" onclick="clearAll()">전체삭제</button></div>
</section>
<section class="result">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
    <h2 style="margin:0">최근 업무일지</h2>
    <div class="filter-buttons" style="display:flex;gap:8px;">
      <button class="btn" id="btnFilterAll" onclick="setFilter('all')" style="padding:6px 12px;font-size:13px;">전체 업무일지</button>
      <button class="btn" id="btnFilterJoo" onclick="setFilter('주현희')" style="padding:6px 12px;font-size:13px;">주현희 업무일지</button>
      <button class="btn" id="btnFilterKim" onclick="setFilter('김정현')" style="padding:6px 12px;font-size:13px;">김정현 업무일지</button>
    </div>
  </div>
  <div id="list"></div>
</section>

<div class="footer">하이탑부동산 · 031-949-8969 · 파주/운정 상가·토지·오피스텔 전문</div>
</div>

<script>
const KEY='hitop_journal';
let currentFilter = 'all';

document.getElementById('date').valueAsDate=new Date();

function save(){
 const item={
   date:v('date'),
   writer:v('writer'),
   kind:v('kind'),
   name:v('name'),
   property:v('property'),
   memo:v('memo')
 };
 const arr=JSON.parse(localStorage.getItem(KEY)||'[]');
 arr.unshift(item);
 localStorage.setItem(KEY,JSON.stringify(arr));
 
 // 저장 완료 후 입력 필드 리셋
 document.getElementById('name').value = '';
 document.getElementById('property').value = '';
 document.getElementById('memo').value = '';
 
 render();
}

function v(id){return document.getElementById(id).value}

function setFilter(filter) {
  currentFilter = filter;
  
  // 모든 필터 버튼의 클래스 및 스타일 초기화
  document.querySelectorAll('.filter-buttons .btn').forEach(btn => {
    btn.style.background = '#0b142c';
    btn.style.color = 'var(--text)';
    btn.style.borderColor = 'var(--line)';
  });
  
  const activeBtnId = filter === 'all' ? 'btnFilterAll' : (filter === '주현희' ? 'btnFilterJoo' : 'btnFilterKim');
  const activeBtn = document.getElementById(activeBtnId);
  if (activeBtn) {
    activeBtn.style.background = 'linear-gradient(135deg,var(--gold),var(--gold2))';
    activeBtn.style.color = '#111827';
    activeBtn.style.borderColor = 'transparent';
  }
  
  render();
}

function render(){
  let arr=JSON.parse(localStorage.getItem(KEY)||'[]');
  
  // 기존 레거시 데이터 무결성 보장: writer가 누락되었을 시 기본값 "주현희" 자동 바인딩
  arr = arr.map(x => ({
    ...x,
    writer: x.writer || '주현희'
  }));
  
  // 필터 상태에 따른 필터링 적용
  const filtered = currentFilter === 'all' ? arr : arr.filter(x => x.writer === currentFilter);
  
  document.getElementById('list').innerHTML=filtered.map(x=>`
    <div style="padding:12px;border-bottom:1px solid rgba(255,255,255,.15)">
      <b>${x.date} · ${x.kind} · <span style="color:var(--gold2)">${x.writer}</span></b><br>
      ${x.name || '고객명 없음'} / ${x.property || '매물명 없음'}<br>
      <span style="color:#cbd7f3">${x.memo || '내용 없음'}</span>
    </div>
  `).join('')||'<div style="padding:12px;color:var(--muted)">저장된 일지가 없습니다.</div>';
}

function clearAll(){if(confirm('전체 삭제할까요?')){localStorage.removeItem(KEY);render();}}

// 초기 필터 설정 및 최초 렌더링 구동
setFilter('all');
</script>

</body>
</html>
