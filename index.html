<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>하이탑 AI 부동산 업무센터</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
/* ══════════════════════════════════════════
   디자인 변수
══════════════════════════════════════════ */
:root{
  --bg:#0d1b2e;
  --card:linear-gradient(135deg,#132540,#1a3356);
  --gold:#D4AF37;
  --gold2:#f0d060;
  --text-p:#f0e8c0;
  --text-s:#b0c4de;
  --text-m:#7a9bbf;
  --border:rgba(255,255,255,.08);
  --border-gold:rgba(212,175,55,.3);
  --danger:#ff7a7a;
}
*{box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{margin:0;font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;
  background:var(--bg);color:var(--text-p);display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{font-family:inherit}

#loading-bar{position:fixed;top:0;left:0;height:2px;width:0;z-index:999;
  background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .35s ease}

.wrap{width:min(1400px,calc(100% - 32px));margin:0 auto;padding:6px 0 8px;
  flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;gap:8px}

/* ── HEADER ── */
.site-header{
  background:var(--card);
  border:1px solid rgba(212,175,55,.25);border-radius:12px;
  padding:8px 18px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:16px;min-width:0}
.logo-mark{width:38px;height:38px;border-radius:9px;
  border:1px solid rgba(212,175,55,.35);background:rgba(212,175,55,.12);
  display:grid;place-items:center;color:var(--gold2);font-weight:900;font-size:13px;flex-shrink:0}
.header-title{margin:0;font-size:20px;font-weight:900;letter-spacing:-1px;color:var(--text-p)}
.header-sub{margin-top:1px;font-size:11px;color:var(--text-m)}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}

/* Date badge */
.date-badge{
  background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:8px;
  padding:4px 12px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:90px;
  cursor:pointer;transition:background .15s,border-color .15s,filter .15s;user-select:none}
.date-badge:hover{background:rgba(212,175,55,.2);border-color:rgba(212,175,55,.55);filter:brightness(1.12)}
.date-badge-d{color:var(--gold);font-weight:800;font-size:13px;letter-spacing:.3px}
.date-badge-w{color:var(--text-m);font-size:13px}

/* Buttons */
.btn{border:1px solid var(--border-gold);border-radius:999px;
  background:transparent;color:var(--text-s);
  padding:5px 13px;font-weight:700;cursor:pointer;font-size:12px;
  display:inline-flex;align-items:center;gap:5px;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--gold2);color:var(--gold2)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111827;border:0;font-weight:800}
.btn.gold:hover{filter:brightness(1.07);color:#111827}

/* ── SEARCH ── */
.search-section{margin-top:0;position:relative;flex-shrink:0}
.search-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  color:var(--text-p);font-size:13px;font-family:inherit;
  padding:8px 16px 8px 42px;outline:none;transition:.15s}
.search-input:focus{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.03)}
.search-input::placeholder{color:var(--text-m)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--gold);font-size:15px;pointer-events:none}
.search-results{display:none;margin-top:6px;
  background:#132540;border:1px solid rgba(212,175,55,.2);border-radius:10px;
  overflow:hidden;max-height:280px;overflow-y:auto;position:absolute;
  left:0;right:0;z-index:100;box-shadow:0 16px 40px rgba(0,0,0,.5)}
.search-results.show{display:block}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s}
.sr-item:last-child{border-bottom:0}
.sr-item:hover{background:rgba(212,175,55,.07)}
.sr-icon{font-size:15px;flex-shrink:0}
.sr-title{font-size:13px;font-weight:700;color:var(--text-p)}
.sr-title .hl{background:rgba(212,175,55,.3);border-radius:3px;color:var(--gold2)}
.sr-meta{font-size:11px;color:var(--text-m);margin-top:1px}
.sr-empty{padding:14px;color:var(--text-m);font-size:12.5px;text-align:center}

/* ── 기존 QUICK SECTIONS (중개업무·콘텐츠채널) ── */
.quick-section{margin-top:0;background:var(--card);
  border:1px solid var(--border);border-radius:10px;padding:7px 12px;flex-shrink:0}
.qs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:6px;flex-wrap:wrap}
.qs-label{font-size:13px;font-weight:700;color:#C9A84C;letter-spacing:.01em;flex:1}
.qs-edit-btn{
  border:1px solid rgba(212,175,55,.25);border-radius:999px;
  background:transparent;color:var(--gold);font-size:12.5px;font-weight:700;
  padding:6px 14px;cursor:pointer;transition:.15s}
.qs-edit-btn:hover{background:rgba(212,175,55,.1)}
.qs-edit-btn.active{background:rgba(212,175,55,.18);border-color:rgba(212,175,55,.5);color:var(--gold2)}

/* ── 섹션 헤더 버튼 공통 ── */
.qs-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
/* 링크 추가 버튼 — 골드 강조 */
.qs-add-btn{
  border:1px solid rgba(212,175,55,.45);border-radius:999px;
  background:rgba(212,175,55,.14);color:var(--gold2);
  font-size:12px;font-weight:700;padding:5px 12px;
  cursor:pointer;transition:.15s;white-space:nowrap}
.qs-add-btn:hover{background:rgba(212,175,55,.3);border-color:var(--gold2)}

/* 사용자 섹션 — 항상 보이는 버튼 래퍼 */
.uqs-btns{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}

/* 사용자 섹션 편집 모드 — 링크 컨트롤 항상 표시 */
.uqs-section.editing .uql-ctrl{opacity:1 !important}
.uqs-section.editing .uqs-actions{opacity:1}

.qc-grid{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start}

/* Normal card */
.qc-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  width:110px;height:110px;flex-shrink:0;
  border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  cursor:pointer;transition:all .15s;text-align:center;user-select:none;overflow:hidden}
.qc-card:hover{transform:translateY(-2px);border-color:rgba(212,175,55,.35);background:rgba(212,175,55,.07)}
.qc-card.gold-border{border-color:rgba(212,175,55,.3)}
.qc-icon{font-size:32px;line-height:1;flex-shrink:0}
.qc-name{font-size:13px;font-weight:700;color:#FFFFFF;
  white-space:normal;word-break:keep-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.3;width:100%;padding:0 6px}

/* Content card variant */
.qc-card.content{background:rgba(212,175,55,.04);border-color:rgba(212,175,55,.14)}
.qc-card.content:hover{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.45)}
.qc-card.content .qc-name{color:#FFFFFF}

/* Edit-mode card */
.qce-card{
  border:1px solid rgba(212,175,55,.22);border-radius:10px;
  background:rgba(212,175,55,.04);padding:8px;min-width:158px;
  display:flex;flex-direction:column;gap:5px;
  transition:opacity .15s,border-color .15s,box-shadow .15s}
.qce-card[draggable="true"]{cursor:default}
.qce-card.qce-dragging{opacity:.4;border-style:dashed;border-color:var(--gold);box-shadow:none}
.qce-card.qce-drag-over{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(212,175,55,.35)}
/* 드래그 핸들 */
.qce-handle{cursor:grab;color:var(--text-m);font-size:15px;flex-shrink:0;
  padding:1px 3px;border-radius:4px;transition:.15s;user-select:none;line-height:1}
.qce-handle:hover{color:var(--gold2);background:rgba(212,175,55,.12)}
.qce-handle:active{cursor:grabbing}
.qce-top{display:flex;align-items:center;gap:5px}
.qce-del{width:22px;height:22px;border-radius:50%;
  border:1px solid rgba(255,122,122,.4);background:transparent;color:var(--danger);
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;flex-shrink:0;transition:.15s}
.qce-del:hover{background:rgba(255,122,122,.14)}
.qce-icon-inp{width:36px;flex-shrink:0;background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:var(--text-p);font-size:15px;font-family:inherit;
  padding:4px;outline:none;text-align:center}
.qce-icon-inp:focus{border-color:rgba(212,175,55,.4)}
.qce-name-inp{flex:1;min-width:0;background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:var(--text-p);font-size:12px;font-family:inherit;
  padding:5px 8px;outline:none}
.qce-name-inp:focus{border-color:rgba(212,175,55,.4)}
.qce-url-inp{width:100%;background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.08);border-radius:6px;
  color:var(--text-m);font-size:11px;font-family:inherit;
  padding:5px 8px;outline:none}
.qce-url-inp:focus{border-color:rgba(212,175,55,.4)}
.qce-nt-row{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-m);cursor:pointer}
.qce-nt-row input{accent-color:var(--gold)}

/* Add form */
.qce-add-form{
  border:1px dashed rgba(212,175,55,.22);border-radius:10px;
  background:rgba(212,175,55,.02);padding:8px;min-width:158px;
  display:flex;flex-direction:column;gap:5px}
.qce-add-btn{
  border:1px solid rgba(212,175,55,.3);border-radius:6px;
  background:rgba(212,175,55,.09);color:var(--gold);
  font-size:11.5px;font-weight:700;padding:5px;
  cursor:pointer;transition:.15s}
.qce-add-btn:hover{background:rgba(212,175,55,.2)}

/* ── 사용자 정의 QUICK SECTIONS ── */
/* display:contents 로 하위 섹션을 .wrap 의 직접 flex 자식처럼 처리
   → .wrap justify-content:space-between 이 모든 섹션에 균등 적용됨 */
#user-quick-sections{display:contents}

.uqs-section{margin-top:0;background:var(--card);
  border:1px solid var(--border);border-radius:10px;padding:7px 12px;
  position:relative;transition:border-color .15s,box-shadow .15s}
.uqs-section.drag-over-cat{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(212,175,55,.25)}
.uqs-section.dragging-cat{opacity:.45}

.uqs-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;user-select:none;flex-wrap:wrap}
.uqs-drag-handle{cursor:grab;color:var(--text-m);font-size:18px;flex-shrink:0;padding:2px 5px;
  border-radius:6px;transition:.15s;line-height:1}
.uqs-drag-handle:hover{color:var(--gold2);background:rgba(212,175,55,.1)}
.uqs-drag-handle:active{cursor:grabbing}
.uqs-label{font-size:13px;font-weight:700;color:#C9A84C;flex:1;letter-spacing:.01em}
.uqs-actions{display:flex;gap:6px;opacity:0;transition:.2s;flex-wrap:wrap}
.uqs-section:hover .uqs-actions{opacity:1}
.uqs-act-btn{border:1px solid rgba(212,175,55,.25);border-radius:999px;
  background:transparent;color:var(--gold);font-size:12px;font-weight:700;
  padding:5px 13px;cursor:pointer;transition:.15s}
.uqs-act-btn:hover{background:rgba(212,175,55,.15);border-color:rgba(212,175,55,.5)}
.uqs-act-btn.danger{border-color:rgba(255,122,122,.3);color:var(--danger)}
.uqs-act-btn.danger:hover{background:rgba(255,122,122,.1)}

/* 사용자 링크 그리드 */
.uql-grid{display:flex;flex-wrap:wrap;gap:8px;min-height:10px;align-items:flex-start}

/* 사용자 링크 카드 */
.uql-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  width:110px;height:110px;flex-shrink:0;
  border-radius:12px;border:1px solid rgba(212,175,55,.2);
  background:rgba(255,255,255,.03);
  cursor:pointer;transition:all .15s;position:relative;user-select:none;overflow:hidden;text-align:center}
.uql-card:hover{transform:translateY(-2px);border-color:rgba(212,175,55,.45);background:rgba(212,175,55,.07)}
.uql-card.dragging-link{opacity:.35;border-style:dashed;transform:none}
.uql-card.drag-over-link{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(212,175,55,.3)}
.uql-icon{font-size:32px;line-height:1;flex-shrink:0}
.uql-name{font-size:13px;font-weight:700;color:#fff;
  white-space:normal;word-break:keep-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.3;width:100%;padding:0 6px}
.uql-desc{display:none}
.uql-ctrl{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0;transition:.15s}
.uql-card:hover .uql-ctrl{opacity:1}
.uql-ctrl button{background:rgba(13,27,46,.88);border:1px solid rgba(212,175,55,.25);
  border-radius:5px;color:var(--text-s);padding:3px 7px;font-size:11px;cursor:pointer;transition:.15s}
.uql-ctrl button:hover{border-color:var(--gold2);color:var(--gold2)}
.uql-ctrl button.del:hover{border-color:rgba(255,122,122,.5);color:var(--danger)}

/* 링크 추가 버튼 (카드 모양) */
.uql-add-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  width:110px;height:110px;flex-shrink:0;
  border-radius:12px;border:1px dashed rgba(212,175,55,.25);
  background:transparent;color:var(--gold);font-size:13px;font-weight:700;
  cursor:pointer;transition:.15s;text-align:center}
.uql-add-btn:hover{border-color:rgba(212,175,55,.55);background:rgba(212,175,55,.05)}

/* 카테고리 추가 버튼 */
.add-cat-wrap{margin-top:auto;flex-shrink:0}
.add-cat-btn{display:block;width:100%;
  border:1px dashed rgba(212,175,55,.3);border-radius:10px;
  background:transparent;color:var(--gold);padding:7px;font-size:12px;font-weight:800;
  cursor:pointer;transition:.15s;text-align:center}
.add-cat-btn:hover{border-color:rgba(212,175,55,.6);background:rgba(212,175,55,.05)}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.82);
  display:none;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(4px);padding:16px}
.modal-backdrop.show{display:flex}
.modal{width:min(460px,100%);background:linear-gradient(145deg,#132540,#0d1b2e);
  border:1px solid rgba(212,175,55,.25);border-radius:16px;padding:22px;
  box-shadow:0 40px 80px rgba(0,0,0,.7);max-height:90vh;overflow-y:auto}
.modal h3{margin:0 0 16px;color:var(--gold2);font-size:16px;font-weight:800}

/* 설정 모달 */
.modal-section{margin-bottom:16px}
.modal-section h4{margin:0 0 8px;font-size:12px;color:var(--gold);font-weight:800;letter-spacing:.2px}
.modal-actions-row{display:flex;gap:8px;flex-wrap:wrap}
.modal-actions-row button{
  border:1px solid rgba(212,175,55,.25);border-radius:999px;
  background:rgba(212,175,55,.07);color:var(--gold);
  font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;transition:.15s}
.modal-actions-row button:hover{background:rgba(212,175,55,.2);border-color:rgba(212,175,55,.5)}
.modal-actions-row button.danger{border-color:rgba(255,122,122,.3);color:var(--danger);background:transparent}
.modal-actions-row button.danger:hover{background:rgba(255,122,122,.1)}
.modal-footer{display:flex;justify-content:flex-end;margin-top:18px}
.m-cancel{border:1px solid rgba(255,255,255,.15);border-radius:999px;
  background:transparent;color:var(--text-m);font-size:13px;font-weight:700;
  padding:9px 18px;cursor:pointer;transition:.15s}
.m-cancel:hover{border-color:var(--gold);color:var(--text-p)}

/* 카테고리/링크 모달 공용 인풋 */
.mi-label{display:block;font-size:12px;font-weight:700;color:var(--text-m);margin:12px 0 4px}
.mi-label:first-of-type{margin-top:0}
.mi-inp{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(212,175,55,.2);border-radius:8px;
  color:var(--text-p);font-size:14px;font-family:inherit;padding:11px 13px;outline:none;transition:.15s}
.mi-inp:focus{border-color:rgba(212,175,55,.55)}
.mi-inp::placeholder{color:var(--text-m)}
.mi-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.mi-row label{font-size:14px;color:var(--text-s);cursor:pointer}
.mi-row input[type="checkbox"]{accent-color:var(--gold);width:16px;height:16px;flex-shrink:0}
.mi-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mi-btns button{padding:9px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.15s}
.mi-btns .mi-save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827}
.mi-btns .mi-save:hover{filter:brightness(1.08)}
.mi-btns .mi-cancel{background:rgba(255,255,255,.06);color:var(--text-m);border:1px solid rgba(255,255,255,.1)}
.mi-btns .mi-cancel:hover{color:var(--text-p)}

/* ── FOOTER ── */
.footer{margin-top:0;border-top:1px solid rgba(255,255,255,.06);padding:5px 0;
  color:var(--text-m);font-size:11px;text-align:center;flex-shrink:0}

/* ── RESPONSIVE ── */
@media(max-width:1200px){.qc-card,.uql-card,.uql-add-btn{width:96px;height:96px}}
@media(max-width:900px){
  .qc-card,.uql-card,.uql-add-btn{width:86px;height:86px}
  .qc-icon,.uql-icon{font-size:26px}
}
@media(max-width:767px){
  .site-header{padding:6px 12px}
  .qc-grid,.uql-grid{gap:6px}
  .qc-card,.uql-card,.uql-add-btn{width:80px;height:80px}
}
@media(max-width:480px){
  .wrap{width:calc(100% - 16px)}
  .header-title{font-size:16px}
  .qc-card,.uql-card,.uql-add-btn{width:70px;height:70px}
  .qc-icon,.uql-icon{font-size:22px}
  .qce-card,.qce-add-form{min-width:140px}
  .modal{padding:16px}
  .uqs-actions{opacity:1}
}
</style>
</head>
<body>
<div id="loading-bar"></div>

<div class="wrap">

  <!-- ① 헤더 -->
  <header class="site-header">
    <div class="header-left">
      <div class="logo-mark">HT</div>
      <div>
        <h1 class="header-title">하이탑 AI 부동산 업무센터</h1>
        <div class="header-sub">매일 업무 시작 — 하나의 컨트롤타워</div>
      </div>
    </div>
    <div class="header-right">
      <div class="date-badge">
        <span class="date-badge-d" id="hdr-date">--</span>
        <span class="date-badge-w" id="hdr-day">--</span>
      </div>
      <button type="button" class="btn" id="btn-settings">⚙ 설정</button>
      <button type="button" class="btn gold" id="btn-property">📦 매물관리</button>
    </div>
  </header>

  <!-- ② 통합 검색 -->
  <div class="search-section">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-inp" class="search-input" autocomplete="off"
           placeholder="메뉴·링크 이름으로 빠르게 검색…"/>
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- ③ 빠른 이동 — 중개 업무 (기존 유지) -->
  <div class="quick-section">
    <div class="qs-header">

  function migrateIfNeeded() {

  function sbFetch(path, method, body, extra) {
    var h = { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' };

    var opt = { method:method||'GET', headers:h };

      g.innerHTML = state.biz.map(function(sc,i){ return buildDisplayCard(sc,i,false); }).join('');

      g.innerHTML = state.biz.map(function(sc){ return buildEditCard(sc,false); }).join('')+buildAddForm(false);
    }
  }
  function renderContent() {
    var g=document.getElementById('content-grid'); if(!g) return;
    if (!state.contentEdit) {
      g.innerHTML = state.content.map(function(sc,i){ return buildDisplayCard(sc,i,true); }).join('');
    } else {
      g.innerHTML = state.content.map(function(sc){ return buildEditCard(sc,true); }).join('')+buildAddForm(true);
    }
  }

  function commitBizEdits() {
    var g=document.getElementById('biz-grid'), newList=[];
    g.querySelectorAll('.qce-card').forEach(function(card){
      var icon=card.querySelector('.qce-icon-inp').value.trim()||'📌';
      var name=card.querySelector('.qce-name-inp').value.trim();
      var url=normUrl(card.querySelector('.qce-url-inp').value);
      var ntEl=card.querySelector('.qce-nt');
      var nt=ntEl?ntEl.checked:isExt(url);
      if(name) newList.push({id:card.dataset.id||newId(),icon,name,url,newTab:nt});
    });
    state.biz=newList; setJson(KEY_BIZ,state.biz); state.bizEdit=false; renderBiz();
    syncSB('biz',state.biz);
    document.getElementById('biz-edit-btn').textContent='✏ 편집';
    document.getElementById('biz-edit-btn').classList.remove('active');
  }
  function commitContentEdits() {
    var g=document.getElementById('content-grid'), newList=[];
    g.querySelectorAll('.qce-card').forEach(function(card){
      var icon=card.querySelector('.qce-icon-inp').value.trim()||'📌';
      var name=card.querySelector('.qce-name-inp').value.trim();
      var url=normUrl(card.querySelector('.qce-url-inp').value);
      if(name) newList.push({id:card.dataset.id||newId(),icon,name,url,newTab:true});
    });
    state.content=newList; setJson(KEY_CONTENT,state.content); state.contentEdit=false; renderContent();
    syncSB('content',state.content);
    document.getElementById('content-edit-btn').textContent='✏ 편집';
    document.getElementById('content-edit-btn').classList.remove('active');
  }

  function handleAddInGrid(grid, isContent) {
    var form=grid.querySelector('.qce-add-form'); if(!form) return;
    var icon=form.querySelector('.qce-icon-inp').value.trim()||'📌';
    var name=form.querySelector('.qce-name-inp').value.trim();
    var url=normUrl(form.querySelector('.qce-url-inp').value);
    var ntEl=form.querySelector('.qce-nt');
    var nt=isContent?true:(ntEl?ntEl.checked:isExt(url));
    if(!name){form.querySelector('.qce-name-inp').focus();return;}
    var newCardHtml=buildEditCard({id:newId(),icon,name,url,newTab:nt},isContent);
    var tmp=document.createElement('div'); tmp.innerHTML=newCardHtml;
    form.before(tmp.firstElementChild);
    form.querySelector('.qce-icon-inp').value='';
    form.querySelector('.qce-name-inp').value='';
    form.querySelector('.qce-url-inp').value='';
    if(ntEl) ntEl.checked=false;
    form.querySelector('.qce-name-inp').focus();
  }

  /* ════════════════════════════════════════════
     편집 모드 드래그 앤 드롭 (중개업무 / 콘텐츠채널)
  ════════════════════════════════════════════ */
  function setupEditDragDrop() {
    ['biz-grid','content-grid'].forEach(function(gridId) {
      var grid = document.getElementById(gridId);
      if (!grid) return;
      var category = gridId === 'biz-grid' ? 'biz' : 'content';

      /* dragstart — 편집 카드에서만 동작 */
      grid.addEventListener('dragstart', function(e) {
        var card = e.target.closest('.qce-card');
        if (!card) { e.preventDefault(); return; }
        /* input·button에서 시작하면 드래그 차단 (텍스트 선택 허용) */
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' ||
            e.target.tagName === 'LABEL' || e.target.tagName === 'TEXTAREA') {
          e.preventDefault(); return;
        }
        _editDragSrc = { id: card.dataset.id, category: category };
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', 'edit:'+category+':'+card.dataset.id);
        /* 드래그 이미지가 먼저 캡처된 뒤 opacity 적용 */
        setTimeout(function(){ card.classList.add('qce-dragging'); }, 0);
      });

      /* dragend */
      grid.addEventListener('dragend', function() {
        grid.querySelectorAll('.qce-card').forEach(function(c) {
          c.classList.remove('qce-dragging','qce-drag-over');
        });
        _editDragSrc = null;
      });

      /* dragover */
      grid.addEventListener('dragover', function(e) {
        if (!_editDragSrc || _editDragSrc.category !== category) return;
        var card = e.target.closest('.qce-card');
        if (!card || card.dataset.id === _editDragSrc.id) return;
        e.preventDefault(); /* ← 필수: 없으면 drop 이벤트가 발생하지 않음 */
        e.dataTransfer.dropEffect = 'move';
        grid.querySelectorAll('.qce-card').forEach(function(c){ c.classList.remove('qce-drag-over'); });
        card.classList.add('qce-drag-over');
      });

      /* dragleave */
      grid.addEventListener('dragleave', function(e) {
        /* 그리드 자체를 벗어날 때만 하이라이트 제거 */
        if (!grid.contains(e.relatedTarget)) {
          grid.querySelectorAll('.qce-card').forEach(function(c){ c.classList.remove('qce-drag-over'); });
        }
      });

      /* drop */
      grid.addEventListener('drop', function(e) {
        if (!_editDragSrc || _editDragSrc.category !== category) return;
        var card = e.target.closest('.qce-card');
        if (!card) return;
        e.preventDefault();

        var fromId = _editDragSrc.id;
        var toId   = card.dataset.id;
        if (fromId === toId) return;

        /* 배열에서 순서 재정렬 */
        var list = category === 'biz' ? state.biz : state.content;
        var fromIdx = -1, toIdx = -1;
        for (var i = 0; i < list.length; i++) {
          if (list[i].id === fromId) fromIdx = i;
          if (list[i].id === toId)   toIdx   = i;
        }
        if (fromIdx === -1 || toIdx === -1) return;

        var moved = list.splice(fromIdx, 1)[0];
        list.splice(toIdx, 0, moved);

        /* 즉시 localStorage 저장 */
        if (category === 'biz') {
          setJson(KEY_BIZ, state.biz);
          /* state.bizEdit = true 유지한 채 렌더 */
          renderBiz();
        } else {
          setJson(KEY_CONTENT, state.content);
          renderContent();
        }
        _editDragSrc = null;
      });
    });
  }

  /* ════════════════════════════════════════════
     사용자 정의 카테고리 시스템
  ════════════════════════════════════════════ */

  /* 정렬된 카테고리 목록 반환 */
  function getOrderedUserCats() {
    var order=state.userCatOrder||[];
    var map={};
    state.userCats.forEach(function(c){ map[c.id]=c; });
    var result=[];
    order.forEach(function(id){ if(map[id]) result.push(map[id]); });
    state.userCats.forEach(function(c){ if(order.indexOf(c.id)===-1) result.push(c); });
    return result;
  }

  /* 전체 사용자 카테고리 렌더 */
  function renderUserCats() {
    var container=document.getElementById('user-quick-sections');
    container.innerHTML='';
    var ordered=getOrderedUserCats();
    ordered.forEach(function(cat){ container.appendChild(buildUserCatEl(cat)); });
    setupCatDragDrop();
    setupAllLinkDragDrop();
  }

  /* 단일 카테고리 DOM 빌드 */
  function buildUserCatEl(cat) {
    var section=document.createElement('div');
    section.className='uqs-section';
    section.dataset.catId=cat.id;

    var linksHtml=(cat.links||[]).map(function(link){ return buildUserLinkHtml(link,cat.id); }).join('');

    section.innerHTML=
      '<div class="uqs-header">'+
        '<span class="uqs-drag-handle" title="드래그로 순서 변경">⠿</span>'+
        '<span class="uqs-label">'+esc(cat.name)+'</span>'+
        /* 항상 보이는 주요 버튼 */
        '<div class="uqs-btns">'+
          '<button class="qs-add-btn" data-action="add-link" data-cat="'+esc(cat.id)+'">＋ 링크 추가</button>'+
          '<button class="qs-edit-btn" data-action="toggle-edit" data-cat="'+esc(cat.id)+'">✏ 편집</button>'+
        '</div>'+
        /* hover 시 표시 — 섹션 관리 (이름 수정, 삭제) */
        '<div class="uqs-actions">'+
          '<button class="uqs-act-btn" data-action="rename" data-cat="'+esc(cat.id)+'">✏ 이름 수정</button>'+
          '<button class="uqs-act-btn danger" data-action="delete-cat" data-cat="'+esc(cat.id)+'">🗑 삭제</button>'+
        '</div>'+
      '</div>'+
      '<div class="uql-grid" data-cat-id="'+esc(cat.id)+'">'+
        linksHtml+
      '</div>';
    return section;
  }

  /* 단일 링크 카드 HTML */
  function buildUserLinkHtml(link, catId) {
    return '<div class="uql-card" draggable="true" data-link-id="'+esc(link.id)+'" data-cat-id="'+esc(catId)+'">'+
      '<div class="uql-ctrl">'+
        '<button data-action="edit-link" data-cat="'+esc(catId)+'" data-link="'+esc(link.id)+'">✏</button>'+
        '<button class="del" data-action="delete-link" data-cat="'+esc(catId)+'" data-link="'+esc(link.id)+'">🗑</button>'+
      '</div>'+
      '<div class="uql-icon">'+esc(link.icon||'🔗')+'</div>'+
      '<div class="uql-name">'+esc(link.name)+'</div>'+
      (link.desc ? '<div class="uql-desc">'+esc(link.desc)+'</div>' : '')+
    '</div>';
  }

  /* 링크 카드 클릭 처리 */
  function handleUserLinkClick(e) {
    // 컨트롤 버튼 클릭은 무시
    if (e.target.closest('.uql-ctrl')) return;
    var card=e.target.closest('.uql-card'); if(!card) return;
    var catId=card.dataset.catId, linkId=card.dataset.linkId;
    var cat=state.userCats.find(function(c){ return c.id===catId; }); if(!cat) return;
    var link=(cat.links||[]).find(function(l){ return l.id===linkId; }); if(!link||!link.url) return;
    if(link.newTab) window.open(link.url,'_blank','noopener');
    else window.location.href=link.url;
  }

  /* 사용자 섹션 이벤트 위임 */
  function bindUserSectionEvents() {
    var container=document.getElementById('user-quick-sections');
    container.addEventListener('click', function(e){
      var btn=e.target.closest('[data-action]');
      if(!btn) {
        // 링크 카드 클릭
        handleUserLinkClick(e);
        return;
      }
      var action=btn.dataset.action, catId=btn.dataset.cat, linkId=btn.dataset.link;
      if(action==='rename')      openCatModal('edit', catId);
      if(action==='delete-cat')  deleteUserCat(catId);
      if(action==='add-link')    openLinkModal('add', catId, null);
      if(action==='edit-link')   openLinkModal('edit', catId, linkId);
      if(action==='delete-link') deleteUserLink(catId, linkId);
      if(action==='toggle-edit') toggleUserSectionEdit(btn);
    });
  }

  /* ── 카테고리 CRUD ── */
  function findCat(catId){ return state.userCats.find(function(c){ return c.id===catId; }); }

  function addUserCat(name) {
    var cat={ id:newId(), name:name, links:[] };
    state.userCats.push(cat);
    if(!state.userCatOrder) state.userCatOrder=[];
    state.userCatOrder.push(cat.id);
    saveUserCats(); renderUserCats();
  }
  function renameUserCat(catId, name) {
    var cat=findCat(catId); if(!cat) return;
    cat.name=name; saveUserCats(); renderUserCats();
  }
  function deleteUserCat(catId) {
    if(!confirm('이 카테고리와 안에 있는 모든 링크를 삭제하시겠습니까?')) return;
    state.userCats=state.userCats.filter(function(c){ return c.id!==catId; });
    state.userCatOrder=(state.userCatOrder||[]).filter(function(id){ return id!==catId; });
    saveUserCats(); renderUserCats();
  }

  /* ── 링크 CRUD ── */
  function addUserLink(catId, linkData) {
    var cat=findCat(catId); if(!cat) return;
    if(!cat.links) cat.links=[];
    linkData.id=newId();
    cat.links.push(linkData);
    saveUserCats(); renderUserCats();
  }
  function editUserLink(catId, linkId, linkData) {
    var cat=findCat(catId); if(!cat) return;
    var idx=(cat.links||[]).findIndex(function(l){ return l.id===linkId; });
    if(idx===-1) return;
    linkData.id=linkId;
    cat.links[idx]=linkData;
    saveUserCats(); renderUserCats();
  }
  function deleteUserLink(catId, linkId) {
    if(!confirm('이 링크를 삭제하시겠습니까?')) return;
    var cat=findCat(catId); if(!cat) return;
    cat.links=(cat.links||[]).filter(function(l){ return l.id!==linkId; });
    saveUserCats(); renderUserCats();
  }

  /* 사용자 섹션 편집 모드 토글 — ctrl 버튼 항상 표시 */
  function toggleUserSectionEdit(btn) {
    var section = btn.closest('.uqs-section');
    if (!section) return;
    var isEditing = section.classList.contains('editing');
    section.classList.toggle('editing');
    btn.textContent = isEditing ? '✏ 편집' : '✔ 완료';
    btn.classList.toggle('active', !isEditing);
  }

  /* ══════════════════════════════════════════
     카테고리 모달
  ══════════════════════════════════════════ */
  var _catMode='add', _catEditId=null;

  function openCatModal(mode, catId) {
    _catMode=mode; _catEditId=catId||null;
    document.getElementById('cat-modal-title').textContent = mode==='add' ? '카테고리 추가' : '카테고리 이름 수정';
    var inp=document.getElementById('cat-name-inp');
    inp.value = mode==='edit' ? (findCat(catId)||{}).name||'' : '';
    document.getElementById('cat-modal').classList.add('show');
    document.getElementById('cat-modal').setAttribute('aria-hidden','false');
    setTimeout(function(){ inp.focus(); }, 60);
  }
  function closeCatModal() {
    document.getElementById('cat-modal').classList.remove('show');
    document.getElementById('cat-modal').setAttribute('aria-hidden','true');
  }
  function saveCatModal() {
    var name=document.getElementById('cat-name-inp').value.trim();
    if(!name){ alert('카테고리 이름을 입력해주세요.'); return; }
    if(_catMode==='add') addUserCat(name);
    else renameUserCat(_catEditId, name);
    closeCatModal();
  }

  /* ══════════════════════════════════════════
     링크 모달
  ══════════════════════════════════════════ */
  var _linkMode='add', _linkCatId=null, _linkEditId=null;

  function openLinkModal(mode, catId, linkId) {
    _linkMode=mode; _linkCatId=catId; _linkEditId=linkId||null;
    document.getElementById('link-modal-title').textContent = mode==='add' ? '링크 추가' : '링크 수정';
    var cat=findCat(catId);
    var link = mode==='edit' && cat ? (cat.links||[]).find(function(l){ return l.id===linkId; }) : null;
    document.getElementById('li-icon').value  = link ? link.icon||'' : '';
    document.getElementById('li-name').value  = link ? link.name||'' : '';
    document.getElementById('li-url').value   = link ? link.url||''  : '';
    document.getElementById('li-desc').value  = link ? link.desc||'' : '';
    document.getElementById('li-newtab').checked = link ? !!link.newTab : true;
    document.getElementById('link-modal').classList.add('show');
    document.getElementById('link-modal').setAttribute('aria-hidden','false');
    setTimeout(function(){ document.getElementById('li-name').focus(); }, 60);
  }
  function closeLinkModal() {
    document.getElementById('link-modal').classList.remove('show');
    document.getElementById('link-modal').setAttribute('aria-hidden','true');
  }
  function saveLinkModal() {
    var name=document.getElementById('li-name').value.trim();
    var url=normUrl(document.getElementById('li-url').value);
    if(!name){ alert('링크 이름을 입력해주세요.'); return; }
    if(!url) { alert('링크 주소를 입력해주세요.'); return; }
    var linkData={
      icon: document.getElementById('li-icon').value.trim()||'🔗',
      name: name, url: url,
      desc: document.getElementById('li-desc').value.trim(),
      newTab: document.getElementById('li-newtab').checked
    };
    if(_linkMode==='add') addUserLink(_linkCatId, linkData);
    else editUserLink(_linkCatId, _linkEditId, linkData);
    closeLinkModal();
  }

  /* ══════════════════════════════════════════
     드래그 앤 드롭 — 카테고리 순서
  ══════════════════════════════════════════ */
  var _dragCatId=null;

  function setupCatDragDrop() {
    var container=document.getElementById('user-quick-sections');
    var sections=container.querySelectorAll('.uqs-section');
    sections.forEach(function(section){
      var handle=section.querySelector('.uqs-drag-handle');
      if(!handle) return;

      handle.addEventListener('mousedown', function(){ section.draggable=true; });
      handle.addEventListener('touchstart', function(){ section.draggable=true; },{passive:true});

      section.addEventListener('dragstart', function(e){
        _dragCatId=section.dataset.catId;
        section.classList.add('dragging-cat');
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain','cat:'+_dragCatId);
      });
      section.addEventListener('dragend', function(){
        section.classList.remove('dragging-cat');
        section.draggable=false;
        container.querySelectorAll('.uqs-section').forEach(function(s){ s.classList.remove('drag-over-cat'); });
        _dragCatId=null;
      });
      section.addEventListener('dragover', function(e){
        if(!_dragCatId) return;
        e.preventDefault(); e.dataTransfer.dropEffect='move';
        container.querySelectorAll('.uqs-section').forEach(function(s){ s.classList.remove('drag-over-cat'); });
        if(section.dataset.catId!==_dragCatId) section.classList.add('drag-over-cat');
      });
      section.addEventListener('dragleave', function(){ section.classList.remove('drag-over-cat'); });
      section.addEventListener('drop', function(e){
        var data=e.dataTransfer.getData('text/plain')||'';
        if(!data.startsWith('cat:')) return;
        e.preventDefault();
        var targetId=section.dataset.catId;
        if(!_dragCatId||_dragCatId===targetId) return;
        reorderCats(_dragCatId, targetId);
      });
    });
    // 마우스업 시 draggable 해제
    document.addEventListener('mouseup', function(){
      sections.forEach(function(s){ s.draggable=false; });
    });
  }

  function reorderCats(fromId, toId) {
    var order=getOrderedUserCats().map(function(c){ return c.id; });
    var fi=order.indexOf(fromId), ti=order.indexOf(toId);
    if(fi===-1||ti===-1) return;
    order.splice(fi,1); order.splice(ti,0,fromId);
    state.userCatOrder=order;
    saveUserCats(); renderUserCats();
  }

  /* ══════════════════════════════════════════
     드래그 앤 드롭 — 링크 순서
  ══════════════════════════════════════════ */
  var _dragLinkId=null, _dragLinkCatId=null;

  function setupAllLinkDragDrop() {
    document.querySelectorAll('.uql-grid').forEach(function(grid){
      setupLinkDragForGrid(grid, grid.dataset.catId);
    });
  }

  function setupLinkDragForGrid(grid, catId) {
    var cards=grid.querySelectorAll('.uql-card');
    cards.forEach(function(card){
      card.addEventListener('dragstart', function(e){
        _dragLinkId=card.dataset.linkId;
        _dragLinkCatId=card.dataset.catId;
        card.classList.add('dragging-link');
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain','link:'+_dragLinkId);
        e.stopPropagation(); // 카테고리 드래그와 분리
      });
      card.addEventListener('dragend', function(){
        card.classList.remove('dragging-link');
        grid.querySelectorAll('.uql-card').forEach(function(c){ c.classList.remove('drag-over-link'); });
        _dragLinkId=null; _dragLinkCatId=null;
      });
      card.addEventListener('dragover', function(e){
        if(!_dragLinkId) return;
        e.preventDefault(); e.stopPropagation();
        e.dataTransfer.dropEffect='move';
        grid.querySelectorAll('.uql-card').forEach(function(c){ c.classList.remove('drag-over-link'); });
        if(card.dataset.linkId!==_dragLinkId) card.classList.add('drag-over-link');
      });
      card.addEventListener('dragleave', function(){ card.classList.remove('drag-over-link'); });
      card.addEventListener('drop', function(e){
        var data=e.dataTransfer.getData('text/plain')||'';
        if(!data.startsWith('link:')) return;
        e.preventDefault(); e.stopPropagation();
        if(_dragLinkCatId!==catId) return; // 다른 카테고리 간 이동 불가
        var targetId=card.dataset.linkId;
        if(!_dragLinkId||_dragLinkId===targetId) return;
        reorderLinks(catId, _dragLinkId, targetId);
      });
    });
  }

  function reorderLinks(catId, fromId, toId) {
    var cat=findCat(catId); if(!cat||!cat.links) return;
    var fi=cat.links.findIndex(function(l){ return l.id===fromId; });
    var ti=cat.links.findIndex(function(l){ return l.id===toId; });
    if(fi===-1||ti===-1) return;
    var moved=cat.links.splice(fi,1)[0];
    cat.links.splice(ti,0,moved);
    saveUserCats(); renderUserCats();
  }

  /* ── 9. 헤더 날짜 ──────────────────────────── */
  function renderHeaderDate() {
    var d=new Date(), days=['일','월','화','수','목','금','토'];
    document.getElementById('hdr-date').textContent =
      d.getFullYear()+'. '+pad2(d.getMonth()+1)+'. '+pad2(d.getDate());
    document.getElementById('hdr-day').textContent = days[d.getDay()]+'요일';
  }

  /* ── 10. 검색 (기존 + 사용자 카테고리) ───── */
  function buildSearchIdx() {
    var idx=[];
    state.biz.forEach(function(sc){
      idx.push({icon:sc.icon,title:sc.name,meta:'중개 업무',url:sc.url,newTab:sc.newTab});
    });
    state.content.forEach(function(sc){
      idx.push({icon:sc.icon,title:sc.name,meta:'콘텐츠 채널',url:sc.url,newTab:true});
    });
    state.userCats.forEach(function(cat){
      (cat.links||[]).forEach(function(link){
        idx.push({icon:link.icon||'🔗',title:link.name,meta:cat.name,url:link.url,newTab:!!link.newTab,desc:link.desc});
      });
    });
    return idx;
  }

  function hlText(str, q) {
    if(!q) return esc(str);
    var escaped=esc(str);
    var re=new RegExp('('+esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return escaped.replace(re,'<span class="hl">$1</span>');
  }

  function handleSearch(q) {
    var box=document.getElementById('search-results'); if(!box) return;
    q=String(q||'').trim().toLowerCase();
    if(!q){ box.classList.remove('show'); box.innerHTML=''; return; }
    var hits=buildSearchIdx().filter(function(it){
      return (it.title||'').toLowerCase().indexOf(q)>=0||
             (it.meta||'').toLowerCase().indexOf(q)>=0||
             (it.desc||'').toLowerCase().indexOf(q)>=0;
    }).slice(0,10);
    if(!hits.length){
      box.innerHTML='<div class="sr-empty">검색 결과 없음</div>';
    } else {
      box.innerHTML=hits.map(function(h){
        return '<div class="sr-item" data-url="'+esc(h.url)+'" data-newtab="'+(h.newTab?'1':'0')+'">'+
          '<div class="sr-icon">'+esc(h.icon)+'</div>'+
          '<div>'+
            '<div class="sr-title">'+hlText(h.title,q)+'</div>'+
            '<div class="sr-meta">'+esc(h.meta)+'</div>'+
          '</div>'+
        '</div>';
      }).join('');
    }
    box.classList.add('show');
  }

  /* ── 11. 백업 / 복원 ───────────────────────── */
  function doBackup() {
    var payload={
      exported_at:new Date().toISOString(), version:5,
      biz:state.biz, content:state.content,
      userCats:state.userCats, userCatOrder:state.userCatOrder
    };
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='hitop-backup-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function doRestoreFile(file) {
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(){
      try{
        var d=JSON.parse(reader.result);
        if(!d){alert('올바른 백업 파일이 아닙니다.');return;}
        if(!confirm('현재 데이터를 복원본으로 덮어쓰시겠습니까?')) return;
        if(Array.isArray(d.biz)&&d.biz.length){ state.biz=d.biz; setJson(KEY_BIZ,state.biz); }
        if(Array.isArray(d.content)&&d.content.length){ state.content=d.content; setJson(KEY_CONTENT,state.content); }
        if(Array.isArray(d.userCats)){ state.userCats=d.userCats; state.userCatOrder=d.userCatOrder||[]; saveUserCats(); }
        renderBiz(); renderContent(); renderUserCats();
        alert('복원 완료!');
      }catch(e){console.error(e);alert('파일 읽기 오류가 발생했습니다.');}
    };
    reader.readAsText(file);
  }

  /* ── 12. 설정 모달 ──────────────────────────── */
  var settingsBd=document.getElementById('settings-backdrop');
  function openSettings(){ settingsBd.classList.add('show'); settingsBd.setAttribute('aria-hidden','false'); }
  function closeSettings(){ settingsBd.classList.remove('show'); settingsBd.setAttribute('aria-hidden','true'); }

  /* ── 13. 이벤트 바인딩 ──────────────────────── */
  function bindEvents() {

    /* 헤더 */
    document.querySelector('.date-badge').addEventListener('click',function(){
      window.open('https://calendar.google.com','_blank','noopener');
    });
    document.getElementById('btn-settings').addEventListener('click', openSettings);
    document.getElementById('btn-property').addEventListener('click',function(){
      window.open(LINKS.propertyManage,'_blank','noopener');
    });

    /* 검색 */
    var si=document.getElementById('search-inp');
    si.addEventListener('input',  function(){ handleSearch(si.value); });
    si.addEventListener('focus',  function(){ if(si.value) handleSearch(si.value); });
    document.getElementById('search-results').addEventListener('click',function(e){
      var it=e.target.closest('.sr-item'); if(!it) return;
      var url=it.dataset.url, nt=it.dataset.newtab==='1';
      if(!url){alert('아직 URL이 등록되지 않았습니다.');return;}
      if(nt||isExt(url)) window.open(url,'_blank','noopener'); else window.location.href=url;
      document.getElementById('search-results').classList.remove('show');
      si.value='';
    });
    document.addEventListener('click',function(e){
      if(!e.target.closest('.search-section')){
        var sr=document.getElementById('search-results');
        if(sr) sr.classList.remove('show');
      }
    });

    /* 중개업무 링크 추가 — 편집 모드 진입 후 입력 폼에 포커스 */
    document.getElementById('biz-add-btn').addEventListener('click',function(){
      if(!state.bizEdit){
        state.bizEdit=true; renderBiz();
        var eb=document.getElementById('biz-edit-btn');
        eb.textContent='✔ 완료'; eb.classList.add('active');
      }
      var inp=document.querySelector('#biz-grid .qce-add-form .qce-name-inp');
      if(inp){ inp.scrollIntoView({behavior:'smooth',block:'nearest'}); inp.focus(); }
    });

    /* 중개업무 편집 */
    document.getElementById('biz-edit-btn').addEventListener('click',function(){
      if(!state.bizEdit){
        state.bizEdit=true; renderBiz();
        this.textContent='✔ 완료'; this.classList.add('active');
      } else { commitBizEdits(); }
    });
    document.getElementById('biz-grid').addEventListener('click',function(e){
      var del=e.target.closest('.qce-del');
      if(del){del.closest('.qce-card').remove();return;}
      var add=e.target.closest('.qce-add-btn');
      if(add){handleAddInGrid(this,false);return;}
      if(!state.bizEdit){
        var card=e.target.closest('.qc-card'); if(!card) return;
        var sc=null;
        for(var i=0;i<state.biz.length;i++) if(state.biz[i].id===card.dataset.id){sc=state.biz[i];break;}
        if(sc) openShortcut(sc,'중개업무');
      }
    });

    /* 콘텐츠채널 링크 추가 — 편집 모드 진입 후 입력 폼에 포커스 */
    document.getElementById('content-add-btn').addEventListener('click',function(){
      if(!state.contentEdit){
        state.contentEdit=true; renderContent();
        var eb=document.getElementById('content-edit-btn');
        eb.textContent='✔ 완료'; eb.classList.add('active');
      }
      var inp=document.querySelector('#content-grid .qce-add-form .qce-name-inp');
      if(inp){ inp.scrollIntoView({behavior:'smooth',block:'nearest'}); inp.focus(); }
    });

    /* 콘텐츠 편집 */
    document.getElementById('content-edit-btn').addEventListener('click',function(){
      if(!state.contentEdit){
        state.contentEdit=true; renderContent();
        this.textContent='✔ 완료'; this.classList.add('active');
      } else { commitContentEdits(); }
    });
    document.getElementById('content-grid').addEventListener('click',function(e){
      var del=e.target.closest('.qce-del');
      if(del){del.closest('.qce-card').remove();return;}
      var add=e.target.closest('.qce-add-btn');
      if(add){handleAddInGrid(this,true);return;}
      if(!state.contentEdit){
        var card=e.target.closest('.qc-card'); if(!card) return;
        var sc=null;
        for(var i=0;i<state.content.length;i++) if(state.content[i].id===card.dataset.id){sc=state.content[i];break;}
        if(sc) openShortcut(sc,'콘텐츠채널');
      }
    });

    /* 편집 모드 드래그 앤 드롭 (중개업무 / 콘텐츠채널) — 그리드 요소에 1회만 등록 */
    setupEditDragDrop();

    /* 카테고리 추가 버튼 */
    document.getElementById('btn-add-cat').addEventListener('click',function(){
      openCatModal('add', null);
    });

    /* 사용자 섹션 이벤트 위임 */
    bindUserSectionEvents();

    /* 카테고리 모달 */
    document.getElementById('cat-modal-save').addEventListener('click', saveCatModal);
    document.getElementById('cat-modal-cancel').addEventListener('click', closeCatModal);
    document.getElementById('cat-modal').addEventListener('click',function(e){
      if(e.target===this) closeCatModal();
    });
    document.getElementById('cat-name-inp').addEventListener('keydown',function(e){
      if(e.key==='Enter') saveCatModal();
      if(e.key==='Escape') closeCatModal();
    });

    /* 링크 모달 */
    document.getElementById('link-modal-save').addEventListener('click', saveLinkModal);
    document.getElementById('link-modal-cancel').addEventListener('click', closeLinkModal);
    document.getElementById('link-modal').addEventListener('click',function(e){
      if(e.target===this) closeLinkModal();
    });
    ['li-name','li-url','li-icon','li-desc'].forEach(function(id){
      document.getElementById(id).addEventListener('keydown',function(e){
        if(e.key==='Escape') closeLinkModal();
      });
    });

    /* 설정 모달 */
    document.getElementById('set-close').addEventListener('click', closeSettings);
    settingsBd.addEventListener('click',function(e){ if(e.target===settingsBd) closeSettings(); });
    document.getElementById('set-backup').addEventListener('click', doBackup);
    document.getElementById('set-restore').addEventListener('click',function(){
      document.getElementById('set-restore-file').click();
    });
    document.getElementById('set-restore-file').addEventListener('change',function(e){
      var f=e.target.files&&e.target.files[0]; doRestoreFile(f); e.target.value='';
    });
    document.getElementById('set-reset-biz').addEventListener('click',function(){
      if(!confirm('중개업무 바로가기를 기본값으로 초기화할까요?')) return;
      state.biz=seedBiz(); setJson(KEY_BIZ,state.biz); renderBiz();
    });
    document.getElementById('set-reset-content').addEventListener('click',function(){
      if(!confirm('콘텐츠채널 바로가기를 기본값으로 초기화할까요?')) return;
      state.content=seedContent(); setJson(KEY_CONTENT,state.content); renderContent();
    });

    /* ESC 단축키 */
    document.addEventListener('keydown',function(e){
      if(e.key==='Escape'){
        closeSettings(); closeCatModal(); closeLinkModal();
        var sr=document.getElementById('search-results');
        if(sr) sr.classList.remove('show');
      }
    });
  }

  /* ── 14. 로딩 바 ────────────────────────────── */
  var loadBar=document.getElementById('loading-bar');
  function setLoad(on){
    if(on){ loadBar.style.transition='width .35s ease'; loadBar.style.width='65%'; }
    else {
      loadBar.style.width='100%';
      setTimeout(function(){
        loadBar.style.transition='none'; loadBar.style.width='0';
        setTimeout(function(){ loadBar.style.transition='width .35s ease'; },50);
      },300);
    }
  }

  /* ── 15. INIT ───────────────────────────────── */
  function init() {
    migrateIfNeeded(); // 버전 불일치 시 카드 데이터 초기화 (항상 최초 실행)
    state.biz     = loadBiz();
    state.content = loadContent();
    var uc        = loadUserCats();
    state.userCats    = uc.cats||[];
    state.userCatOrder= uc.catOrder||[];

    renderHeaderDate();
    renderBiz();
    renderContent();
    renderUserCats();
    bindEvents();

    setLoad(true);
    tryLoadFromSB();
    setTimeout(function(){ setLoad(false); }, 1200);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();

})();
</script>
</body>
</html>
