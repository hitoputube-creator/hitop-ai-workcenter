<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>하이탑 AI 부동산 업무센터</title>
<style>
:root{
  --bg:#071024; --panel:#101b34; --panel2:#16264d;
  --gold:#d6ad35; --gold2:#ffd75a; --text:#f8fafc; --muted:#aab7d4;
  --line:rgba(214,173,53,.42); --white:#fff; --ink:#172033; --danger:#ff7a7a;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;
  background:linear-gradient(180deg,#101b34,#071024 45%,#050914);
  color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

/* ── Loading bar ── */
#loading-bar{position:fixed;top:0;left:0;height:2px;width:0;z-index:999;
  background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .35s ease}

/* ── Layout ── */
.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 40px;flex:1}

/* ── Header ── */
.header{display:flex;justify-content:space-between;gap:18px;align-items:center;
  border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:6px}
.logo{display:flex;align-items:center;gap:14px}
.logo-mark{width:44px;height:44px;border:1px solid var(--line);border-radius:12px;
  display:grid;place-items:center;color:var(--gold2);font-weight:900;
  background:rgba(214,173,53,.12);font-size:14px}
h1{margin:0;font-size:22px;letter-spacing:-1px}
.sub{margin-top:3px;color:var(--muted);font-size:12.5px}
.btn{border:1px solid var(--line);border-radius:999px;background:#0b142c;color:var(--text);
  padding:8px 14px;font-weight:800;cursor:pointer;font-size:13px;font-family:inherit}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border:0}

/* ── Section ── */
section.cat{padding-top:18px}
section.cat+section.cat{margin-top:6px;border-top:1px solid rgba(214,173,53,.1)}
section.cat.dragging{opacity:.3;pointer-events:none}
section.cat.drag-over{outline:2px dashed var(--gold);outline-offset:4px;border-radius:12px}

.section-header{display:flex;justify-content:space-between;align-items:center;margin:14px 0 12px;gap:8px}
.sec-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}

.drag-handle{
  color:var(--muted);font-size:14px;cursor:grab;user-select:none;letter-spacing:-3px;
  opacity:0;transition:opacity .15s;flex-shrink:0;padding:2px 4px;border-radius:4px;
}
.section-header:hover .drag-handle{opacity:.55}
.drag-handle:hover{opacity:1!important;color:var(--gold2)}
.drag-handle:active{cursor:grabbing}

.sec-title{
  margin:0;font-size:15px;color:var(--gold2);font-weight:800;letter-spacing:.2px;
  cursor:default;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-bottom:1px dashed transparent;transition:border-color .15s;
}
.section-header:hover .sec-title{border-bottom-color:rgba(255,215,90,.25)}
.sec-title-hint{font-size:10px;color:transparent;transition:color .15s;white-space:nowrap;flex-shrink:0}
.section-header:hover .sec-title-hint{color:var(--muted)}

.sec-edit-input{
  background:#0b142c;border:1px solid var(--gold2);border-radius:8px;
  color:var(--gold2);font-size:15px;font-weight:800;font-family:inherit;
  padding:3px 8px;outline:none;width:200px;max-width:50vw;
}

.sec-delete{
  opacity:0;transition:opacity .15s;background:transparent;border:none;
  color:var(--danger);font-size:12px;cursor:pointer;padding:3px 6px;
  border-radius:4px;flex-shrink:0;line-height:1;
}
.section-header:hover .sec-delete{opacity:1}
.sec-delete:hover{background:rgba(255,122,122,.12)}

.add-btn{
  border:1px solid var(--line);background:rgba(214,173,53,.08);color:var(--gold2);
  font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px;
  cursor:pointer;font-family:inherit;transition:.15s;flex-shrink:0;
}
.add-btn:hover{background:rgba(214,173,53,.22);border-color:var(--gold2)}

/* ── Add section button ── */
.add-section-wrap{padding:18px 0 6px;text-align:center}
.add-section-btn{
  background:transparent;border:1px dashed rgba(214,173,53,.28);color:var(--muted);
  border-radius:12px;padding:10px 36px;font-size:13px;font-weight:800;
  cursor:pointer;font-family:inherit;transition:.15s;
}
.add-section-btn:hover{border-color:var(--gold2);color:var(--gold2);background:rgba(214,173,53,.06)}

/* ── Grid & cards ── */
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{
  position:relative;border:1px solid rgba(214,173,53,.28);border-radius:14px;
  background:linear-gradient(145deg,#16264d,#0b1630);
  padding:0 14px;height:120px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  text-align:center;cursor:pointer;
  transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;
  user-select:none;
}
.card:not(.linked){opacity:.8;cursor:default}
.card:hover{transform:translateY(-2px);border-color:var(--gold2);
  background:linear-gradient(145deg,#1d3263,#10204a);box-shadow:0 10px 24px rgba(0,0,0,.3)}
.card .icon{font-size:28px;line-height:1}
.card h3{margin:0;font-size:13px;font-weight:800;letter-spacing:-.2px;color:var(--text);word-break:keep-all}
.card-edit{
  position:absolute;top:6px;right:6px;
  background:rgba(0,0,0,.25);border:1px solid rgba(214,173,53,.18);color:var(--gold2);
  width:24px;height:24px;border-radius:50%;font-size:11px;line-height:1;
  cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;padding:0;
}
.card:hover .card-edit{opacity:1}
.card-edit:hover{background:rgba(214,173,53,.22);border-color:var(--gold2)}

/* ── Footer ── */
.footer{flex-shrink:0;border-top:1px solid var(--line);padding:14px 0;
  color:var(--muted);font-size:12px;text-align:center;background:rgba(7,16,36,.6)}

/* ── Modal ── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(5,9,20,.75);
  display:none;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(3px);padding:16px;
}
.modal-backdrop.show{display:flex}
.modal{
  width:min(440px,100%);
  background:linear-gradient(145deg,#182746,#0c1932);
  border:1px solid var(--line);border-radius:18px;padding:24px;
  box-shadow:0 40px 100px rgba(0,0,0,.6);
}
.modal h3{margin:0 0 18px;color:var(--gold2);font-size:17px;letter-spacing:-.3px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:800;letter-spacing:.2px}
.modal input{
  width:100%;background:#0b142c;border:1px solid var(--line);border-radius:10px;
  padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.modal input:focus{border-color:var(--gold2)}
.modal input::placeholder{color:#5e6c8a}
.modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:8px}
.modal-actions .m-right{display:flex;gap:8px;margin-left:auto}
.modal button{font-family:inherit;border-radius:999px;padding:9px 18px;font-weight:800;font-size:13px;cursor:pointer;border:1px solid transparent;transition:.15s}
.m-cancel{background:transparent;border-color:var(--line);color:var(--muted)}
.m-cancel:hover{color:var(--text);border-color:var(--gold2)}
.m-save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border:0}
.m-save:hover{filter:brightness(1.06)}
.m-delete{background:transparent;border:1px solid rgba(255,122,122,.4);color:var(--danger)}
.m-delete:hover{background:rgba(255,122,122,.12)}
.m-delete.hidden{display:none}

/* ── Responsive ── */
@media(max-width:900px){
  .grid{grid-template-columns:repeat(3,1fr)}
  .header{align-items:flex-start;flex-direction:column;gap:12px}
}
@media(max-width:560px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .wrap{width:calc(100% - 22px);padding-top:20px}
  h1{font-size:20px}
}
</style>
</head>
<body>
<div id="loading-bar"></div>

<div class="wrap">
  <header class="header">
    <div class="logo">
      <div class="logo-mark">HT</div>
      <div>
        <h1>하이탑 AI 부동산 업무센터</h1>
        <div class="sub">필요한 도구를 빠르게 실행</div>
      </div>
    </div>
    <a class="btn gold" href="https://hitoputube-creator.github.io/haitop-realty-system/" target="_blank">기존 매물관리</a>
  </header>

  <div id="sections-container"></div>

  <div class="add-section-wrap">
    <button type="button" id="add-section-btn" class="add-section-btn">＋ 섹션 추가</button>
  </div>
</div>

<footer class="footer">하이탑부동산 · 031-949-8969</footer>

<!-- 공용 모달 (카드 추가/수정, 섹션 추가) -->
<div class="modal-backdrop" id="modal-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h3 id="modal-title">작업 수정</h3>
    <div class="form-row">
      <label for="m-name" id="m-name-label">카드 이름</label>
      <input type="text" id="m-name" maxlength="40" placeholder="예: 계약문자">
    </div>
    <div class="form-row" id="row-icon">
      <label for="m-icon">아이콘 (이모지)</label>
      <input type="text" id="m-icon" maxlength="4" placeholder="📌">
    </div>
    <div class="form-row" id="row-url">
      <label for="m-url">연결 URL</label>
      <input type="url" id="m-url" placeholder="https://... (비워두면 클릭 비활성)">
    </div>
    <div class="modal-actions">
      <button type="button" class="m-delete hidden" id="m-delete">삭제</button>
      <div class="m-right">
        <button type="button" class="m-cancel" id="m-cancel">취소</button>
        <button type="button" class="m-save"   id="m-save">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  /* ══════════════════════════════════════════
     1. SUPABASE REST CLIENT
  ══════════════════════════════════════════ */
  var SB_URL = 'https://xaxbkdnrzsghsabkdvzj.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhheGJrZG5yenNnaHNhYmtkdnpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjc5NTIsImV4cCI6MjA4OTY0Mzk1Mn0.l27ZYQHLt48p7EQrZ8gbAOmJHvCfIur84CtgoWlA8Wg';

  function sbFetch(path, method, body, extra) {
    var h = {
      'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json'
    };
    if (extra) Object.assign(h, extra);
    var opt = { method: method || 'GET', headers: h };
    if (body !== undefined && body !== null) opt.body = JSON.stringify(body);
    return fetch(SB_URL + path, opt).then(function (r) {
      if (!r.ok) return r.text().then(function (t) { throw new Error(t); });
      if (r.status === 204) return null;
      return r.json();
    });
  }

  /* ══════════════════════════════════════════
     2. SECTIONS – Supabase API wrappers
  ══════════════════════════════════════════ */
  function apiFetchSections() {
    return sbFetch('/rest/v1/sections?select=*&order=order_index.asc');
  }
  function apiCreateSection(name, orderIndex) {
    return sbFetch('/rest/v1/sections', 'POST',
      { name: name, order_index: orderIndex },
      { 'Prefer': 'return=representation' }
    );
  }
  function apiRenameSection(id, name) {
    return sbFetch('/rest/v1/sections?id=eq.' + id, 'PATCH', { name: name });
  }
  function apiDeleteSection(id) {
    return sbFetch('/rest/v1/sections?id=eq.' + id, 'DELETE');
  }
  function apiReorder(sections) {
    return Promise.all(sections.map(function (s, i) {
      return sbFetch('/rest/v1/sections?id=eq.' + s.id, 'PATCH', { order_index: i });
    })).catch(function (e) { console.warn('reorder DB error:', e); });
  }

  /* ══════════════════════════════════════════
     3. CARD DATA  (localStorage)
  ══════════════════════════════════════════ */
  var CARD_KEY   = 'hitopDashboardData';
  var LEGACY_KEY = 'hitopWorkspaces';
  var CARD_SEED  = {
    '콘텐츠 자동화': [
      { id: 'def-shorts',   title: '숏츠 제작',     icon: '🎬', url: '' },
      { id: 'def-blog',     title: '블로그 생성',   icon: '✍️', url: '' },
      { id: 'def-cafe',     title: '카페글 생성',   icon: '☕', url: '' }
    ],
    '중개 실무 도구': [
      { id: 'def-contract', title: '계약문자',      icon: '📩', url: 'https://hitoputube-creator.github.io/Contract-Message/index.html' },
      { id: 'def-broker',   title: '중개보수',      icon: '🧾', url: '' },
      { id: 'def-quote',    title: '수익률 견적서', icon: '📊', url: '' },
      { id: 'def-estimate', title: '견적서',        icon: '📑', url: '' }
    ],
    '관리 시스템': [
      { id: 'def-realty',   title: '매물관리',  icon: '🏢', url: '' },
      { id: 'def-calendar', title: '캘린더',    icon: '📅', url: '' },
      { id: 'def-journal',  title: '업무일지',  icon: '📝', url: '' }
    ]
  };

  function loadCards() {
    var raw = localStorage.getItem(CARD_KEY);
    if (raw) { try { return JSON.parse(raw); } catch (e) {} }
    var init = JSON.parse(JSON.stringify(CARD_SEED));
    // 레거시 데이터 마이그레이션
    try {
      var old = JSON.parse(localStorage.getItem(LEGACY_KEY) || '[]');
      if (Array.isArray(old)) old.forEach(function (it) {
        var cat = it.category;
        if (!init[cat]) init[cat] = [];
        init[cat].push({
          id: it.id || ('mig-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6)),
          title: it.title || '제목없음', icon: it.icon || '📌',
          url: normUrl(it.link || it.url || '')
        });
      });
    } catch (e) {}
    saveCards(init);
    return init;
  }
  function saveCards(d) { localStorage.setItem(CARD_KEY, JSON.stringify(d)); }
  function findCard(d, id) {
    var ks = Object.keys(d);
    for (var i = 0; i < ks.length; i++) {
      var arr = d[ks[i]];
      for (var j = 0; j < arr.length; j++) {
        if (arr[j].id === id) return { cat: ks[i], idx: j, item: arr[j] };
      }
    }
    return null;
  }

  /* ══════════════════════════════════════════
     4. HELPERS
  ══════════════════════════════════════════ */
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function normUrl(u) {
    u = String(u || '').trim();
    if (!u) return '';
    if (/^(https?:|mailto:|tel:|\/|\.\/|\.\.\/)/i.test(u)) return u;
    return 'https://' + u;
  }
  function newId() { return 'ws-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7); }

  /* ══════════════════════════════════════════
     5. STATE
  ══════════════════════════════════════════ */
  var SEC_CACHE = 'hitopSectionsCache';
  var DEFAULT_SECTIONS = [
    { id: 'local-0', name: '콘텐츠 자동화', order_index: 0 },
    { id: 'local-1', name: '중개 실무 도구', order_index: 1 },
    { id: 'local-2', name: '관리 시스템',   order_index: 2 }
  ];
  var state = { sections: [] };

  function getCache() { try { return JSON.parse(localStorage.getItem(SEC_CACHE)) || []; } catch (e) { return []; } }
  function setCache(s) { localStorage.setItem(SEC_CACHE, JSON.stringify(s)); }

  /* ══════════════════════════════════════════
     6. RENDER
  ══════════════════════════════════════════ */
  function buildCard(item) {
    var el = document.createElement('div');
    el.className = 'card' + (item.url ? ' linked' : '');
    el.dataset.id = item.id;
    el.innerHTML =
      '<button type="button" class="card-edit" data-edit="' + esc(item.id) + '" title="수정" aria-label="수정">✏️</button>' +
      '<div class="icon">' + esc(item.icon || '📌') + '</div>' +
      '<h3>' + esc(item.title) + '</h3>';
    return el;
  }

  function buildSection(sec) {
    var el = document.createElement('section');
    el.className = 'cat';
    el.dataset.secId = sec.id;
    el.draggable = true;
    el.innerHTML =
      '<div class="section-header">' +
        '<div class="sec-left">' +
          '<span class="drag-handle" title="드래그하여 순서 변경" aria-label="순서 변경">⠿⠿</span>' +
          '<h2 class="sec-title" data-sec-id="' + esc(sec.id) + '" data-sec-name="' + esc(sec.name) + '">' + esc(sec.name) + '</h2>' +
          '<span class="sec-title-hint">더블클릭 수정</span>' +
          '<button type="button" class="sec-delete" data-sec-id="' + esc(sec.id) + '" data-sec-name="' + esc(sec.name) + '" title="섹션 삭제">✕</button>' +
        '</div>' +
        '<button type="button" class="add-btn" data-category="' + esc(sec.name) + '">+ 작업 추가</button>' +
      '</div>' +
      '<div class="grid" data-category="' + esc(sec.name) + '"></div>';
    return el;
  }

  function renderCards() {
    var d = loadCards();
    state.sections.forEach(function (sec) {
      if (!d[sec.name]) { d[sec.name] = []; saveCards(d); }
      var grid = document.querySelector('.grid[data-category="' + sec.name + '"]');
      if (!grid) return;
      grid.innerHTML = '';
      (d[sec.name] || []).forEach(function (item) { grid.appendChild(buildCard(item)); });
    });
  }

  function render() {
    var container = document.getElementById('sections-container');
    container.innerHTML = '';
    state.sections.forEach(function (sec) { container.appendChild(buildSection(sec)); });
    renderCards();
    bindDrag();
  }

  /* ══════════════════════════════════════════
     7. DRAG & DROP  (HTML5 native)
  ══════════════════════════════════════════ */
  var dragSrcId = null;

  function bindDrag() {
    document.querySelectorAll('.cat').forEach(function (cat) {
      cat.addEventListener('dragstart',  onDragStart);
      cat.addEventListener('dragend',    onDragEnd);
      cat.addEventListener('dragover',   onDragOver);
      cat.addEventListener('dragleave',  onDragLeave);
      cat.addEventListener('drop',       onDrop);
    });
  }

  function onDragStart(e) {
    // 버튼, 카드, 인풋에서 드래그 시작 방지
    if (e.target.closest('.card') || e.target.closest('button') ||
        e.target.closest('input') || e.target.closest('a')) {
      e.preventDefault(); return;
    }
    dragSrcId = this.dataset.secId;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcId);
  }
  function onDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.cat').forEach(function (c) { c.classList.remove('drag-over'); });
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (this.dataset.secId !== dragSrcId) this.classList.add('drag-over');
  }
  function onDragLeave(e) {
    if (!this.contains(e.relatedTarget)) this.classList.remove('drag-over');
  }
  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    var targetId = this.dataset.secId;
    if (!dragSrcId || dragSrcId === targetId) return;
    var si = state.sections.findIndex(function (s) { return s.id === dragSrcId; });
    var ti = state.sections.findIndex(function (s) { return s.id === targetId; });
    if (si < 0 || ti < 0) return;
    var moved = state.sections.splice(si, 1)[0];
    state.sections.splice(ti, 0, moved);
    setCache(state.sections);
    render();
    apiReorder(state.sections); // 비동기 저장 (실패해도 UI는 정상)
  }

  /* ══════════════════════════════════════════
     8. SECTION 인라인 이름 수정
  ══════════════════════════════════════════ */
  function activateSecEdit(h2) {
    var secId   = h2.dataset.secId;
    var oldName = h2.dataset.secName;
    var inp = document.createElement('input');
    inp.className = 'sec-edit-input';
    inp.value = oldName;
    h2.replaceWith(inp);
    inp.focus(); inp.select();

    var committed = false;

    function commit() {
      if (committed) return;
      committed = true;
      var newName = inp.value.trim();
      if (!newName || newName === oldName) { cancel(); return; }
      // 카드 데이터 키 이름 변경
      var d = loadCards();
      if (d[oldName] !== undefined) {
        d[newName] = d[oldName];
        delete d[oldName];
        saveCards(d);
      }
      // 상태 업데이트
      var sec = state.sections.find(function (s) { return s.id === secId; });
      if (sec) sec.name = newName;
      setCache(state.sections);
      render();
      apiRenameSection(secId, newName).catch(function (e) { console.warn('rename error:', e); });
    }
    function cancel() { try { inp.replaceWith(h2); } catch (e) {} }

    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { committed = true; cancel(); }
    });
    inp.addEventListener('blur', commit);
  }

  /* ══════════════════════════════════════════
     9. MODAL
  ══════════════════════════════════════════ */
  var backdrop   = document.getElementById('modal-backdrop');
  var titleEl    = document.getElementById('modal-title');
  var inName     = document.getElementById('m-name');
  var inIcon     = document.getElementById('m-icon');
  var inUrl      = document.getElementById('m-url');
  var btnSave    = document.getElementById('m-save');
  var btnCancel  = document.getElementById('m-cancel');
  var btnDelete  = document.getElementById('m-delete');
  var rowIcon    = document.getElementById('row-icon');
  var rowUrl     = document.getElementById('row-url');
  var nameLabel  = document.getElementById('m-name-label');

  // mode: 'add-card' | 'edit-card' | 'add-section'
  var ms = { mode: 'add-card', category: null, id: null };

  function openModal(mode, opts) {
    ms.mode = mode; ms.category = opts.category || null; ms.id = opts.id || null;
    if (mode === 'add-section') {
      titleEl.textContent = '새 섹션 추가';
      nameLabel.textContent = '섹션 이름';
      inName.value = ''; inName.placeholder = '예: 계약 관리';
      rowIcon.style.display = rowUrl.style.display = 'none';
      btnDelete.classList.add('hidden');
      btnSave.textContent = '추가';
    } else if (mode === 'add-card') {
      titleEl.textContent = '새 작업 추가 — ' + (opts.category || '');
      nameLabel.textContent = '카드 이름';
      inName.value = ''; inIcon.value = ''; inUrl.value = '';
      inName.placeholder = '예: 계약문자';
      rowIcon.style.display = rowUrl.style.display = '';
      btnDelete.classList.add('hidden');
      btnSave.textContent = '추가';
    } else { // edit-card
      titleEl.textContent = '작업 수정';
      nameLabel.textContent = '카드 이름';
      inName.value = opts.item.title || '';
      inIcon.value = opts.item.icon  || '';
      inUrl.value  = opts.item.url   || '';
      inName.placeholder = '예: 계약문자';
      rowIcon.style.display = rowUrl.style.display = '';
      btnDelete.classList.remove('hidden');
      btnSave.textContent = '저장';
    }
    backdrop.classList.add('show');
    backdrop.setAttribute('aria-hidden', 'false');
    setTimeout(function () { inName.focus(); }, 30);
  }

  function closeModal() {
    backdrop.classList.remove('show');
    backdrop.setAttribute('aria-hidden', 'true');
  }

  function saveModal() {
    var nameVal = inName.value.trim();
    if (!nameVal) {
      alert(ms.mode === 'add-section' ? '섹션 이름은 필수입니다.' : '카드 이름은 필수입니다.');
      inName.focus(); return;
    }
    if (ms.mode === 'add-section') {
      closeModal();
      doAddSection(nameVal); return;
    }
    var icon = inIcon.value.trim() || '📌';
    var url  = normUrl(inUrl.value);
    var d = loadCards();
    if (ms.mode === 'add-card') {
      if (!d[ms.category]) d[ms.category] = [];
      d[ms.category].push({ id: newId(), title: nameVal, icon: icon, url: url });
    } else {
      var found = findCard(d, ms.id);
      if (found) { found.item.title = nameVal; found.item.icon = icon; found.item.url = url; }
    }
    saveCards(d); renderCards(); closeModal();
  }

  function deleteFromModal() {
    if (ms.mode !== 'edit-card' || !ms.id) return;
    if (!confirm('이 카드를 삭제하시겠습니까?')) return;
    var d = loadCards();
    var f = findCard(d, ms.id);
    if (f) { d[f.cat].splice(f.idx, 1); saveCards(d); renderCards(); }
    closeModal();
  }

  /* ══════════════════════════════════════════
     10. SECTION ADD / DELETE
  ══════════════════════════════════════════ */
  function doAddSection(name) {
    var orderIdx = state.sections.length;
    apiCreateSection(name, orderIdx).then(function (rows) {
      var newSec = (Array.isArray(rows) && rows[0]) ||
                  { id: 'local-' + Date.now(), name: name, order_index: orderIdx };
      state.sections.push(newSec);
      setCache(state.sections);
      render();
    }).catch(function (e) {
      console.warn('createSection error:', e);
      state.sections.push({ id: 'local-' + Date.now(), name: name, order_index: orderIdx });
      setCache(state.sections);
      render();
    });
  }

  function doDeleteSection(secId, secName) {
    if (!confirm('"' + secName + '" 섹션을 삭제하시겠습니까?\n(섹션 안의 카드도 모두 삭제됩니다)')) return;
    state.sections = state.sections.filter(function (s) { return s.id !== secId; });
    var d = loadCards(); delete d[secName]; saveCards(d);
    setCache(state.sections);
    render();
    apiDeleteSection(secId).catch(function (e) { console.warn('deleteSection error:', e); });
  }

  /* ══════════════════════════════════════════
     11. 이벤트 위임
  ══════════════════════════════════════════ */
  document.addEventListener('click', function (e) {
    // 카드 수정 버튼
    var editBtn = e.target.closest('.card-edit');
    if (editBtn) {
      e.preventDefault(); e.stopPropagation();
      var f = findCard(loadCards(), editBtn.dataset.edit);
      if (f) openModal('edit-card', { id: editBtn.dataset.edit, item: f.item, category: f.cat });
      return;
    }
    // 작업 추가 버튼
    var addBtn = e.target.closest('.add-btn');
    if (addBtn && addBtn.dataset.category) {
      e.preventDefault();
      openModal('add-card', { category: addBtn.dataset.category }); return;
    }
    // 섹션 추가 버튼
    if (e.target.closest('#add-section-btn')) {
      e.preventDefault();
      openModal('add-section', {}); return;
    }
    // 섹션 삭제 버튼
    var secDel = e.target.closest('.sec-delete');
    if (secDel) {
      e.preventDefault(); e.stopPropagation();
      doDeleteSection(secDel.dataset.secId, secDel.dataset.secName); return;
    }
    // 카드 클릭 → URL 이동
    var card = e.target.closest('.card');
    if (card && card.classList.contains('linked') && !e.target.closest('.card-edit')) {
      var f2 = findCard(loadCards(), card.dataset.id);
      if (f2 && f2.item.url) window.open(f2.item.url, '_blank', 'noopener');
      return;
    }
  });

  // 섹션 제목 더블클릭 → 인라인 수정
  document.addEventListener('dblclick', function (e) {
    var h2 = e.target.closest('.sec-title');
    if (h2) { e.preventDefault(); activateSecEdit(h2); }
  });

  btnSave.addEventListener('click', saveModal);
  btnCancel.addEventListener('click', closeModal);
  btnDelete.addEventListener('click', deleteFromModal);
  backdrop.addEventListener('click', function (e) { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', function (e) {
    if (!backdrop.classList.contains('show')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && (e.target === inName || e.target === inIcon || e.target === inUrl)) {
      e.preventDefault(); saveModal();
    }
  });

  /* ══════════════════════════════════════════
     12. 로딩 바
  ══════════════════════════════════════════ */
  var bar = document.getElementById('loading-bar');
  function setLoad(on) {
    if (on) { bar.style.transition = 'width .35s ease'; bar.style.width = '65%'; }
    else {
      bar.style.width = '100%';
      setTimeout(function () {
        bar.style.transition = 'none'; bar.style.width = '0';
        setTimeout(function () { bar.style.transition = 'width .35s ease'; }, 50);
      }, 300);
    }
  }

  /* ══════════════════════════════════════════
     13. INIT
  ══════════════════════════════════════════ */
  function init() {
    // 1단계: 캐시로 즉시 렌더
    var cached = getCache();
    if (cached.length) { state.sections = cached; render(); }

    // 2단계: Supabase에서 최신 데이터 동기화
    setLoad(true);
    apiFetchSections().then(function (fresh) {
      setLoad(false);
      if (fresh && Array.isArray(fresh) && fresh.length) {
        state.sections = fresh;
        setCache(fresh);
        render();
      } else if (!state.sections.length) {
        state.sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
        render();
      }
    }).catch(function (e) {
      setLoad(false);
      console.warn('Supabase fetch failed, using cache/defaults:', e);
      if (!state.sections.length) {
        state.sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
        render();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
