<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>하이탑 AI 부동산 업무센터</title>
<style>
:root{
  --bg:#071024; --panel:#101b34; --panel2:#16264d;
  --gold:#d6ad35; --gold2:#ffd75a; --text:#f8fafc; --muted:#aab7d4;
  --line:rgba(214,173,53,.42); --white:#fff; --ink:#172033;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;background:linear-gradient(180deg,#101b34,#071024 45%,#050914);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 50px}
.header{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:22px}
.logo{display:flex;align-items:center;gap:14px}
.logo-mark{width:46px;height:46px;border:1px solid var(--line);border-radius:14px;display:grid;place-items:center;color:var(--gold2);font-weight:900;background:rgba(214,173,53,.12)}
h1{margin:0;font-size:24px;letter-spacing:-1px}
.sub{margin-top:4px;color:var(--muted);font-size:13px}
.btn{border:1px solid var(--line);border-radius:999px;background:#0b142c;color:var(--text);padding:8px 14px;font-weight:800;cursor:pointer;font-size:13px}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border:0}

.section-header{display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px}
.section-header h2{margin:0;font-size:15px;color:var(--gold2);font-weight:800;letter-spacing:.2px}
.add-btn{border:1px solid var(--line);background:rgba(214,173,53,.08);color:var(--gold2);font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px;cursor:pointer;font-family:inherit;transition:.15s}
.add-btn:hover{background:rgba(214,173,53,.2);border-color:var(--gold2)}

.grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.card{min-height:90px;border:1px solid rgba(214,173,53,.28);border-radius:12px;background:linear-gradient(145deg,#16264d,#0b1630);padding:14px;display:flex;flex-direction:column;justify-content:center;transition:.15s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);border-color:var(--gold2);box-shadow:0 10px 24px rgba(0,0,0,.28)}
.card .icon{font-size:22px;margin-bottom:6px;line-height:1}
.card h3{margin:0;font-size:15px;font-weight:800;letter-spacing:-.2px}
.card p{display:none}

.user-card .ws-delete{position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;width:22px;height:22px;border-radius:50%;display:none;align-items:center;justify-content:center;font-family:inherit;padding:0}
.user-card:hover .ws-delete{display:inline-flex}
.user-card .ws-delete:hover{background:rgba(255,255,255,.1);color:#ff7a7a}

.footer{margin-top:30px;border-top:1px solid var(--line);padding-top:16px;color:var(--muted);font-size:12px}

@media(max-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:760px){.grid{grid-template-columns:repeat(3,1fr)}.header{align-items:flex-start;flex-direction:column}}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}.wrap{width:calc(100% - 22px);padding-top:20px}h1{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <div class="logo">
      <div class="logo-mark">HT</div>
      <div>
        <h1>하이탑 AI 부동산 업무센터</h1>
        <div class="sub">필요한 도구를 빠르게 실행</div>
      </div>
    </div>
    <a class="btn gold" href="https://hitoputube-creator.github.io/haitop-realty-system/" target="_blank">기존 매물관리</a>
  </header>

  <div class="section-header">
    <h2>콘텐츠 자동화</h2>
    <button type="button" class="add-btn" data-category="콘텐츠 자동화">+ 작업 추가</button>
  </div>
  <div class="grid" data-category="콘텐츠 자동화">
    <a class="card" href="shorts/index.html" title="매물·상권 내용을 짧은 영상 구성으로 정리"><div class="icon">🎬</div><h3>숏츠 제작</h3></a>
    <a class="card" href="blog/index.html" title="매물 정보를 블로그 글·제목·태그로 변환"><div class="icon">✍️</div><h3>블로그 생성</h3></a>
    <a class="card" href="cafe/index.html" title="지역 카페 홍보용 글 자동 구성"><div class="icon">☕</div><h3>카페글 생성</h3></a>
  </div>

  <div class="section-header">
    <h2>중개 실무 도구</h2>
    <button type="button" class="add-btn" data-category="중개 실무 도구">+ 작업 추가</button>
  </div>
  <div class="grid" data-category="중개 실무 도구">
    <a class="card" href="contract-message/index.html" title="계약 조건을 고객 발송 문자로 정리"><div class="icon">📩</div><h3>계약문자</h3></a>
    <a class="card" href="brokerage/index.html" title="매매·전세·월세 중개보수 계산"><div class="icon">🧾</div><h3>중개보수</h3></a>
    <a class="card" href="quote/index.html" title="상가 투자 수익률과 제안서 생성"><div class="icon">📊</div><h3>수익률 견적서</h3></a>
    <a class="card" href="estimate/index.html" title="상가·오피스텔 상담용 견적서"><div class="icon">📑</div><h3>견적서</h3></a>
  </div>

  <div class="section-header">
    <h2>관리 시스템</h2>
    <button type="button" class="add-btn" data-category="관리 시스템">+ 작업 추가</button>
  </div>
  <div class="grid" data-category="관리 시스템">
    <a class="card" href="https://hitoputube-creator.github.io/haitop-realty-system/" target="_blank" title="기존 하이탑 매물관리 본체"><div class="icon">🏢</div><h3>매물관리</h3></a>
    <a class="card" href="calendar/index.html" title="상담·계약·업무 일정 관리"><div class="icon">📅</div><h3>캘린더</h3></a>
    <a class="card" href="journal/index.html" title="상담·방문·계약 진행 상황 기록"><div class="icon">📝</div><h3>업무일지</h3></a>
  </div>

  <div class="footer">하이탑부동산 · 031-949-8969</div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'hitopWorkspaces';

  function getItems(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e){ return []; }
  }
  function saveItems(items){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }
  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function normalizeLink(url){
    var u = String(url || '').trim();
    if(!u) return '';
    if(/^(https?:|mailto:|tel:|\/|\.\/|\.\.\/)/i.test(u)) return u;
    return 'https://' + u;
  }

  function addWorkspace(category){
    var title = prompt('작업명을 입력하세요');
    if(title === null) return;
    title = title.trim();
    if(!title){ alert('작업명은 필수입니다.'); return; }

    var desc = prompt('설명을 입력하세요 (생략 가능)');
    if(desc === null) return;

    var icon = prompt('아이콘(이모지)을 입력하세요 (생략 시 📌)');
    if(icon === null) return;
    icon = (icon || '').trim() || '📌';

    var link = prompt('링크 URL을 입력하세요 (예: https://... 또는 폴더/index.html)');
    if(link === null) return;
    link = link.trim();
    if(!link){ alert('링크는 필수입니다.'); return; }

    var item = {
      id: 'ws_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      category: category,
      title: title,
      desc: desc || '',
      icon: icon,
      link: normalizeLink(link)
    };
    var items = getItems();
    items.push(item);
    saveItems(items);
    render();
  }

  function deleteWorkspace(id){
    if(!confirm('이 작업을 삭제하시겠습니까?')) return;
    var items = getItems().filter(function(it){ return it.id !== id; });
    saveItems(items);
    render();
  }

  function buildCard(it){
    var card = document.createElement('a');
    card.className = 'card user-card';
    card.href = it.link || '#';
    card.target = '_blank';
    card.rel = 'noopener';
    card.dataset.id = it.id;
    if(it.desc) card.title = it.desc;
    card.innerHTML =
      '<button type="button" class="ws-delete" data-id="' + escapeHtml(it.id) + '" title="삭제" aria-label="삭제">×</button>' +
      '<div class="icon">' + escapeHtml(it.icon) + '</div>' +
      '<h3>' + escapeHtml(it.title) + '</h3>';
    return card;
  }

  function render(){
    document.querySelectorAll('.user-card').forEach(function(el){ el.remove(); });

    var items = getItems();
    items.forEach(function(it){
      var grid = document.querySelector('.grid[data-category="' + it.category + '"]');
      if(!grid) return;
      grid.appendChild(buildCard(it));
    });
  }

  document.addEventListener('click', function(e){
    var delBtn = e.target.closest('.ws-delete');
    if(delBtn){
      e.preventDefault();
      e.stopPropagation();
      deleteWorkspace(delBtn.dataset.id);
      return;
    }
    var addBtn = e.target.closest('.add-btn');
    if(addBtn && addBtn.dataset.category){
      e.preventDefault();
      addWorkspace(addBtn.dataset.category);
      return;
    }
  });

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
</body>
</html>
