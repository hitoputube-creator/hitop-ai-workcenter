<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>하이탑 AI 부동산 업무센터</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
/* ══════════════════════════════════════════
   디자인 변수
══════════════════════════════════════════ */
:root{
  --bg:#0d1b2e;
  --card:linear-gradient(135deg,#132540,#1a3356);
  --gold:#D4AF37;
  --gold2:#f0d060;
  --text-p:#f0e8c0;
  --text-s:#b0c4de;
  --text-m:#7a9bbf;
  --border:rgba(255,255,255,.08);
  --border-gold:rgba(212,175,55,.3);
  --danger:#ff7a7a;
}
*{box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{margin:0;font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;
  background:var(--bg);color:var(--text-p);height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{text-decoration:none;color:inherit}
button{font-family:inherit}

#loading-bar{position:fixed;top:0;left:0;height:2px;width:0;z-index:999;
  background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .35s ease}

.wrap{width:min(1300px,calc(100% - 48px));margin:0 auto;padding:20px 0 16px;
  flex:1;display:flex;flex-direction:column;min-height:0}

/* ── HEADER ── */
.site-header{
  background:var(--card);
  border:1px solid rgba(212,175,55,.25);border-radius:14px;
  padding:20px 28px;display:flex;align-items:center;
  justify-content:space-between;gap:16px;flex-wrap:wrap;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:16px;min-width:0}
.logo-mark{width:52px;height:52px;border-radius:12px;
  border:1px solid rgba(212,175,55,.35);background:rgba(212,175,55,.12);
  display:grid;place-items:center;color:var(--gold2);font-weight:900;font-size:16px;flex-shrink:0}
.header-title{margin:0;font-size:26px;font-weight:900;letter-spacing:-1px;color:var(--text-p)}
.header-sub{margin-top:3px;font-size:14px;color:var(--text-m)}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}

/* Date badge */
.date-badge{
  background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);border-radius:10px;
  padding:8px 16px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:110px}
.date-badge-d{color:var(--gold);font-weight:800;font-size:15px;letter-spacing:.3px}
.date-badge-w{color:var(--text-m);font-size:13px}

/* Buttons */
.btn{border:1px solid var(--border-gold);border-radius:999px;
  background:transparent;color:var(--text-s);
  padding:10px 18px;font-weight:700;cursor:pointer;font-size:14px;
  display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--gold2);color:var(--gold2)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111827;border:0;font-weight:800}
.btn.gold:hover{filter:brightness(1.07);color:#111827}

/* ── SEARCH ── */
.search-section{margin-top:20px;position:relative;flex-shrink:0}
.search-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  color:var(--text-p);font-size:16px;font-family:inherit;
  padding:15px 20px 15px 50px;outline:none;transition:.15s}
.search-input:focus{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.03)}
.search-input::placeholder{color:var(--text-m)}
.search-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);
  color:var(--gold);font-size:17px;pointer-events:none}
.search-results{display:none;margin-top:6px;
  background:#132540;border:1px solid rgba(212,175,55,.2);border-radius:10px;
  overflow:hidden;max-height:260px;overflow-y:auto}
.search-results.show{display:block}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s}
.sr-item:last-child{border-bottom:0}
.sr-item:hover{background:rgba(212,175,55,.07)}
.sr-icon{font-size:15px;flex-shrink:0}
.sr-title{font-size:13px;font-weight:700;color:var(--text-p)}
.sr-meta{font-size:11px;color:var(--text-m);margin-top:1px}
.sr-empty{padding:14px;color:var(--text-m);font-size:12.5px;text-align:center}

/* ── QUICK SECTIONS ── */
.quick-section{margin-top:20px;background:var(--card);
  border:1px solid var(--border);border-radius:14px;padding:20px 24px;flex-shrink:0}
.qs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.qs-label{font-size:15px;font-weight:700;color:#C9A84C;letter-spacing:.01em}
.qs-edit-btn{
  border:1px solid rgba(212,175,55,.25);border-radius:999px;
  background:transparent;color:var(--gold);font-size:12.5px;font-weight:700;
  padding:6px 14px;cursor:pointer;transition:.15s}
.qs-edit-btn:hover{background:rgba(212,175,55,.1)}
.qs-edit-btn.active{background:rgba(212,175,55,.18);border-color:rgba(212,175,55,.5);color:var(--gold2)}

.qc-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}

/* Normal card */
.qc-card{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:18px 22px;min-width:96px;
  border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  cursor:pointer;transition:all .15s;text-align:center;user-select:none}
.qc-card:hover{transform:translateY(-2px);border-color:rgba(212,175,55,.35);background:rgba(212,175,55,.07)}
.qc-card.gold-border{border-color:rgba(212,175,55,.3)}
.qc-icon{font-size:30px;line-height:1}
.qc-name{font-size:14px;font-weight:700;color:var(--text-s);white-space:nowrap}

/* Content card variant */
.qc-card.content{background:rgba(212,175,55,.04);border-color:rgba(212,175,55,.14)}
.qc-card.content:hover{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.45)}
.qc-card.content .qc-name{color:var(--gold)}

/* Edit-mode card */
.qce-card{
  border:1px solid rgba(212,175,55,.22);border-radius:10px;
  background:rgba(212,175,55,.04);padding:8px;min-width:158px;
  display:flex;flex-direction:column;gap:5px}
.qce-top{display:flex;align-items:center;gap:5px}
.qce-del{width:22px;height:22px;border-radius:50%;
  border:1px solid rgba(255,122,122,.4);background:transparent;color:var(--danger);
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;flex-shrink:0;transition:.15s}
.qce-del:hover{background:rgba(255,122,122,.14)}
.qce-icon-inp{width:36px;flex-shrink:0;background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:var(--text-p);font-size:15px;font-family:inherit;
  padding:4px;outline:none;text-align:center}
.qce-icon-inp:focus{border-color:rgba(212,175,55,.4)}
.qce-name-inp{flex:1;min-width:0;background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:var(--text-p);font-size:12px;font-family:inherit;
  padding:5px 8px;outline:none}
.qce-name-inp:focus{border-color:rgba(212,175,55,.4)}
.qce-url-inp{width:100%;background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.08);border-radius:6px;
  color:var(--text-m);font-size:11px;font-family:inherit;
  padding:5px 8px;outline:none}
.qce-url-inp:focus{border-color:rgba(212,175,55,.4)}
.qce-nt-row{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-m);cursor:pointer}
.qce-nt-row input{accent-color:var(--gold)}

/* Add form */
.qce-add-form{
  border:1px dashed rgba(212,175,55,.22);border-radius:10px;
  background:rgba(212,175,55,.02);padding:8px;min-width:158px;
  display:flex;flex-direction:column;gap:5px}
.qce-add-btn{
  border:1px solid rgba(212,175,55,.3);border-radius:6px;
  background:rgba(212,175,55,.09);color:var(--gold);
  font-size:11.5px;font-weight:700;padding:5px;
  cursor:pointer;transition:.15s}
.qce-add-btn:hover{background:rgba(212,175,55,.2)}

/* ── BOTTOM 2-COLUMN ── */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px;flex:1;min-height:0}
.bottom-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;
  display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.bp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0}
.bp-label{font-size:15px;font-weight:700;color:#C9A84C;letter-spacing:.01em}
.bp-link{border:none;background:transparent;color:var(--gold);
  font-size:13px;font-weight:700;cursor:pointer;padding:0;transition:.15s}
.bp-link:hover{color:var(--gold2)}

/* Schedule list */
.sch-list{display:flex;flex-direction:column;flex:1}
.sch-row{display:flex;align-items:stretch;gap:12px;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sch-row:last-child{border-bottom:0}
.sch-row.done{opacity:.4}
.sch-row.done .sch-title{text-decoration:line-through}
.sch-bar{width:4px;border-radius:2px;flex-shrink:0;min-height:100%}
.bar-morning{background:#4a9eff}
.bar-afternoon{background:var(--gold)}
.bar-evening{background:#4ad68a}
.bar-none{background:#4a6580}
.sch-body{flex:1;min-width:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sch-time{font-size:13.5px;color:var(--text-m);font-weight:700;flex-shrink:0}
.sch-title{font-size:15px;font-weight:700;color:var(--text-p);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.sch-type{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;
  background:rgba(212,175,55,.14);color:var(--gold);flex-shrink:0}
.sch-add-btn{margin-top:12px;width:100%;flex-shrink:0;
  border:1px dashed rgba(212,175,55,.22);border-radius:10px;
  background:transparent;color:var(--text-m);font-size:14px;font-weight:700;
  padding:10px;cursor:pointer;transition:.15s;text-align:center}
.sch-add-btn:hover{border-color:rgba(212,175,55,.45);color:var(--gold)}
.panel-empty{padding:30px 0;text-align:center;color:var(--text-m);font-size:15px;flex:1;display:flex;align-items:center;justify-content:center}

/* Recent list */
.recent-list{display:flex;flex-direction:column;flex:1}
.recent-row{display:flex;align-items:center;gap:10px;
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.recent-row:last-child{border-bottom:0}
.recent-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.recent-time{font-size:12.5px;color:var(--text-m)}
.recent-type{font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px;
  background:rgba(212,175,55,.12);color:var(--gold);border:1px solid rgba(212,175,55,.2)}
.recent-text{flex:1;min-width:0;font-size:15px;color:var(--text-s);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-go{border:none;background:transparent;color:var(--gold);
  font-size:15px;cursor:pointer;padding:2px 6px;flex-shrink:0;transition:.15s}
.recent-go:hover{color:var(--gold2)}

/* ── FOOTER ── */
.footer{flex-shrink:0;border-top:1px solid rgba(255,255,255,.06);padding:10px 0;
  color:var(--text-m);font-size:13px;text-align:center;background:rgba(0,0,0,.2)}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(4px);padding:16px}
.modal-backdrop.show{display:flex}
.modal{width:min(440px,100%);background:linear-gradient(145deg,#132540,#0d1b2e);
  border:1px solid rgba(212,175,55,.25);border-radius:16px;padding:22px;
  box-shadow:0 40px 80px rgba(0,0,0,.7);max-height:90vh;overflow-y:auto}
.modal h3{margin:0 0 16px;color:var(--gold2);font-size:16px;font-weight:800}
.modal-section{margin-bottom:16px}
.modal-section h4{margin:0 0 8px;font-size:12px;color:var(--gold);font-weight:800;letter-spacing:.2px}
.modal-actions-row{display:flex;gap:8px;flex-wrap:wrap}
.modal-actions-row button{
  border:1px solid rgba(212,175,55,.25);border-radius:999px;
  background:rgba(212,175,55,.07);color:var(--gold);
  font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;transition:.15s}
.modal-actions-row button:hover{background:rgba(212,175,55,.2);border-color:rgba(212,175,55,.5)}
.modal-actions-row button.danger{border-color:rgba(255,122,122,.3);color:var(--danger);background:transparent}
.modal-actions-row button.danger:hover{background:rgba(255,122,122,.1)}
.modal-footer{display:flex;justify-content:flex-end;margin-top:18px}
.m-cancel{border:1px solid rgba(255,255,255,.15);border-radius:999px;
  background:transparent;color:var(--text-m);font-size:13px;font-weight:700;
  padding:9px 18px;cursor:pointer;transition:.15s}
.m-cancel:hover{border-color:var(--gold);color:var(--text-p)}

/* ── RESPONSIVE ── */
@media(max-width:900px){.qc-card{min-width:80px;padding:14px 16px}}
@media(max-width:767px){
  html,body{overflow:auto;height:auto}
  .wrap{display:block;height:auto;padding-bottom:24px}
  .bottom-grid{grid-template-columns:1fr;flex:none}
  .site-header{padding:16px 18px}}
@media(max-width:480px){
  .wrap{width:calc(100% - 22px);padding-top:14px}
  .header-title{font-size:19px}
  .qc-card{min-width:68px;padding:12px 12px}
  .qc-icon{font-size:24px}
  .qc-name{font-size:12px}
  .qce-card,.qce-add-form{min-width:140px}
  .modal{padding:18px}}
</style>
</head>
<body>
<div id="loading-bar"></div>

<div class="wrap">

  <!-- ① 헤더 -->
  <header class="site-header">
    <div class="header-left">
      <div class="logo-mark">HT</div>
      <div>
        <h1 class="header-title">하이탑 AI 부동산 업무센터</h1>
        <div class="header-sub">매일 업무 시작 — 하나의 컨트롤타워</div>
      </div>
    </div>
    <div class="header-right">
      <div class="date-badge">
        <span class="date-badge-d" id="hdr-date">--</span>
        <span class="date-badge-w" id="hdr-day">--</span>
      </div>
      <button type="button" class="btn" id="btn-settings">⚙ 설정</button>
      <button type="button" class="btn gold" id="btn-property">📦 매물관리</button>
    </div>
  </header>

  <!-- ② 통합 검색 -->
  <div class="search-section">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-inp" class="search-input" autocomplete="off"
           placeholder="메뉴 이름으로 빠르게 검색…"/>
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- ③ 빠른 이동 — 중개 업무 -->
  <div class="quick-section">
    <div class="qs-header">
      <span class="qs-label">⚡ 빠른 이동 — 중개 업무</span>
      <button type="button" class="qs-edit-btn" id="biz-edit-btn">✏ 편집</button>
    </div>
    <div class="qc-grid" id="biz-grid"></div>
  </div>

  <!-- ④ 빠른 이동 — 콘텐츠 채널 -->
  <div class="quick-section">
    <div class="qs-header">
      <span class="qs-label">📡 빠른 이동 — 콘텐츠 채널</span>
      <button type="button" class="qs-edit-btn" id="content-edit-btn">✏ 편집</button>
    </div>
    <div class="qc-grid" id="content-grid"></div>
  </div>

  <!-- ⑤ 오늘 일정 + 최근 작업 -->
  <div class="bottom-grid">
    <div class="bottom-panel">
      <div class="bp-header">
        <span class="bp-label">📅 오늘 일정</span>
        <button type="button" class="bp-link" id="btn-full-cal">전체 캘린더 →</button>
      </div>
      <div id="today-list"></div>
      <button type="button" class="sch-add-btn" id="btn-add-schedule">＋ 일정 추가</button>
    </div>
    <div class="bottom-panel">
      <div class="bp-header">
        <span class="bp-label">🕐 최근 작업</span>
      </div>
      <div id="recent-list"></div>
    </div>
  </div>

</div>

<footer class="footer">하이탑부동산 · 031-949-8969</footer>

<!-- ⚙ 설정 모달 -->
<div class="modal-backdrop" id="settings-backdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <h3>⚙ 설정</h3>

    <div class="modal-section">
      <h4>데이터 백업 / 복원</h4>
      <div class="modal-actions-row">
        <button type="button" id="set-backup">💾 JSON 백업</button>
        <button type="button" id="set-restore">📂 JSON 복원</button>
        <input type="file" id="set-restore-file" accept=".json,application/json" style="display:none">
      </div>
    </div>

    <div class="modal-section">
      <h4>초기화</h4>
      <div class="modal-actions-row">
        <button type="button" id="set-reset-biz"     class="danger">🔄 중개업무 기본값</button>
        <button type="button" id="set-reset-content"  class="danger">🔄 콘텐츠채널 기본값</button>
      </div>
    </div>

    <div class="modal-section" style="margin-bottom:0">
      <h4>Supabase 동기화 안내</h4>
      <p style="font-size:12px;color:var(--text-m);margin:0;line-height:1.6">
        바로가기는 localStorage에 즉시 저장되며,<br>
        Supabase <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">dashboard_shortcuts</code>
        테이블이 있으면 자동으로 동기화됩니다.
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="m-cancel" id="set-close">닫기</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   하이탑 AI 부동산 업무센터 — 대시보드 v4
   단일 HTML 파일 · Vanilla JS IIFE
══════════════════════════════════════════════════════════ */
(function () {

  /* ── 0. 링크 중앙 관리 ─────────────────────────── */
  var LINKS = {
    propertyManage : 'https://hitoputube-creator.github.io/haitop-realty-system/',
    workDiary      : './journal/',
    calendar       : './calendar/',
    contractMessage: './contract-message/',
    estimate       : './quote/',        // 수익률 견적서
    brokerageFee   : './brokerage/',
    youtube        : './shorts/',
    blog           : './blog/',
    cafe           : './cafe/'
  };

  /* ── 1. 상수 / 키 ─────────────────────────────── */
  var KEY_BIZ     = 'hitop_biz_sc';
  var KEY_CONTENT = 'hitop_content_sc';
  var KEY_RECENT  = 'hitop_recent_actions';
  var KEY_SCHEDULE= 'hitop_schedule_items';

  /* ── 2. 시드 데이터 ───────────────────────────── */
  function seedBiz() {
    return [
      { id:'b1', icon:'🏠', name:'매물관리',   url:LINKS.propertyManage,  newTab:true  },
      { id:'b2', icon:'📅', name:'캘린더',     url:LINKS.calendar,        newTab:false },
      { id:'b3', icon:'📓', name:'업무일지',   url:LINKS.workDiary,        newTab:false },
      { id:'b4', icon:'💬', name:'계약문자',   url:LINKS.contractMessage,  newTab:false },
      { id:'b5', icon:'💰', name:'중개보수',   url:LINKS.brokerageFee,     newTab:false },
      { id:'b6', icon:'📊', name:'수익률견적', url:LINKS.estimate,         newTab:false }
    ];
  }
  function seedContent() {
    return [
      { id:'c1', icon:'📺', name:'하이탑부동산TV', url:'https://www.youtube.com/@하이탑부동산TV', newTab:true },
      { id:'c2', icon:'🤖', name:'나도한다AI',     url:'',                                        newTab:true },
      { id:'c3', icon:'📝', name:'하이탑블로그',   url:LINKS.blog,                                newTab:true },
      { id:'c4', icon:'☕', name:'하이탑카페',     url:LINKS.cafe,                                newTab:true }

  /* ── 3. 헬퍼 ─────────────────────────────────── */
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function normUrl(u) {
    u = String(u||'').trim();
    if (!u || u==='#') return '';
    if (/^(https?:|\.\/|\.\.\/|\/)/i.test(u)) return u;
    return 'https://' + u;
  }
  function isExt(u) { return /^https?:/i.test(u||''); }
  function newId() { return 'i-'+Date.now()+'-'+Math.random().toString(36).slice(2,6); }
  function safeJson(k, fb) {
    try { var v=JSON.parse(localStorage.getItem(k)); return v==null?fb:v; }
    catch(e){ return fb; }
  }
  function setJson(k,v) { localStorage.setItem(k,JSON.stringify(v)); }
  function pad2(n){ return String(n).padStart(2,'0'); }
  function todayStr() {
    var d=new Date();
    return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
  }
  function fmtTs(ts) {
    var d=new Date(ts);
    return pad2(d.getMonth()+1)+'/'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());
  }

  function sbFetch(path, method, body, extra) {
    var h = { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' };
    if (extra) Object.assign(h, extra);
    var opt = { method:method||'GET', headers:h };
    if (body!=null) opt.body = JSON.stringify(body);
    return fetch(SB_URL+path, opt).then(function(r){
      if (!r.ok) return r.text().then(function(t){ throw new Error(t); });
      if (r.status===204) return null;
      return r.json();
    });
  }
  function normFromDB(row) {
    return { id:String(row.id||newId()), icon:row.icon||'📌', name:row.name||'',
             url:row.url||'', newTab:!!row.open_in_new_tab };
  }
  function syncSB(category, shortcuts) {
    // Delete-all-then-insert approach (simple replace)
    sbFetch('/rest/v1/dashboard_shortcuts?category=eq.'+category, 'DELETE')
      .then(function(){
        if (!shortcuts.length) return null;
        return sbFetch('/rest/v1/dashboard_shortcuts', 'POST',
          shortcuts.map(function(sc,i){
            return { id:sc.id, category:category, name:sc.name, icon:sc.icon,
                     url:sc.url, sort_order:i, open_in_new_tab:!!sc.newTab };
          }), { 'Prefer':'return=minimal' });
      })
      .catch(function(e){ console.warn('[hitop] Supabase sync ('+category+') failed:', e); });
  }
  function tryLoadFromSB() {
    Promise.all([
      sbFetch('/rest/v1/dashboard_shortcuts?select=*&category=eq.biz&order=sort_order.asc').catch(function(){ return null; }),
      sbFetch('/rest/v1/dashboard_shortcuts?select=*&category=eq.content&order=sort_order.asc').catch(function(){ return null; })
    ]).then(function(res){
      var bizDB=res[0], conDB=res[1];
      var changed=false;
      if (Array.isArray(bizDB) && bizDB.length) {
        state.biz = bizDB.map(normFromDB);
        setJson(KEY_BIZ, state.biz);
        changed=true;
      }
      if (Array.isArray(conDB) && conDB.length) {
        state.content = conDB.map(normFromDB);
        setJson(KEY_CONTENT, state.content);
        changed=true;
      }
      if (changed) { renderBiz(); renderContent(); }
    }).catch(function(){
      console.warn('[hitop] Supabase shortcuts load failed — using localStorage');
    });
  }

  function handleAddInGrid(grid, isContent) {
    var form = grid.querySelector('.qce-add-form');
    if (!form) return;
    var icon = form.querySelector('.qce-icon-inp').value.trim() || '📌';

    var url  = normUrl(form.querySelector('.qce-url-inp').value);
    var ntEl = form.querySelector('.qce-nt');
    var nt   = isContent ? true : (ntEl ? ntEl.checked : isExt(url));

    var newCardHtml = buildEditCard({ id:newId(), icon:icon, name:name, url:url, newTab:nt }, isContent);

    form.querySelector('.qce-name-inp').value = '';

  /* ── 9. 오늘 일정 ───────────────────────────── */
  function renderToday() {
    var box = document.getElementById('today-list'); if (!box) return;
    var items = safeJson(KEY_SCHEDULE, []);
    var today = todayStr();
    var todayItems = items.filter(function(it){ return it.date===today; });
    todayItems.sort(function(a,b){ return (a.time||'99:99').localeCompare(b.time||'99:99'); });

    if (!todayItems.length) {
      box.innerHTML = '<div class="panel-empty">오늘 등록된 일정이 없습니다</div>';
      return;
    }
    box.innerHTML = '<div class="sch-list">' +
      todayItems.map(function(it){
        var h = it.time ? parseInt(it.time.split(':')[0],10) : -1;
        var bar = h<0?'bar-none':h<12?'bar-morning':h<18?'bar-afternoon':'bar-evening';
        var doneClass = it.done ? ' done' : '';
        return '<div class="sch-row'+doneClass+'">' +
          '<div class="sch-bar '+bar+'"></div>' +
          '<div class="sch-body">' +
            (it.time ? '<span class="sch-time">'+esc(it.time)+'</span>' : '') +
            '<span class="sch-title">'+esc(it.title||'(제목없음)')+'</span>' +
            (it.type ? '<span class="sch-type">'+esc(it.type)+'</span>' : '') +
          '</div>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  function buildSearchIdx() {

    state.biz.forEach(function(sc){ idx.push({ icon:sc.icon, title:sc.name, meta:'중개 업무', url:sc.url, newTab:sc.newTab, id:sc.id, cat:'biz' }); });

  function handleSearch(q) {
    var box = document.getElementById('search-results'); if (!box) return;
    q = String(q||'').trim().toLowerCase();
    if (!q) { box.classList.remove('show'); box.innerHTML=''; return; }
    var hits = buildSearchIdx().filter(function(it){
      return it.title.toLowerCase().indexOf(q)>=0 || it.meta.toLowerCase().indexOf(q)>=0;
    }).slice(0,8);
    if (!hits.length) {
      box.innerHTML = '<div class="sr-empty">검색 결과 없음</div>';
    } else {
      box.innerHTML = hits.map(function(h){
        return '<div class="sr-item" data-url="'+esc(h.url)+'" data-newtab="'+(h.newTab?'1':'0')+'" data-id="'+esc(h.id)+'" data-cat="'+esc(h.cat)+'">' +

        '</div>';
      }).join('');
    }
    box.classList.add('show');
  }

  /* ── 13. 백업 / 복원 / 초기화 ──────────────── */
  function doBackup() {
    var payload = {
      exported_at: new Date().toISOString(), version:4,
      biz: state.biz, content: state.content,
      recent: safeJson(KEY_RECENT,[]), schedule: safeJson(KEY_SCHEDULE,[])
    };
    var blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download='hitop-backup-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    addRecentAction({type:'백업',text:'대시보드 백업 파일 생성'});
  }
  function doRestoreFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var d = JSON.parse(reader.result);
        if (!d) { alert('올바른 백업 파일이 아닙니다.'); return; }
        if (!confirm('현재 데이터를 복원본으로 덮어쓰시겠습니까?')) return;
        if (Array.isArray(d.biz)      && d.biz.length)      { state.biz=d.biz;         setJson(KEY_BIZ,state.biz); }
        if (Array.isArray(d.content)  && d.content.length)  { state.content=d.content;  setJson(KEY_CONTENT,state.content); }
        if (Array.isArray(d.recent))   setJson(KEY_RECENT, d.recent);
        if (Array.isArray(d.schedule)) setJson(KEY_SCHEDULE, d.schedule);
        renderBiz(); renderContent(); renderToday(); renderRecent();
        alert('복원 완료!');
      } catch(e){ console.error(e); alert('파일 읽기 오류가 발생했습니다.'); }
    };
    reader.readAsText(file);
  }

    document.getElementById('recent-list').addEventListener('click', function(e){
      var b = e.target.closest('[data-ri]'); if(!b) return;
      var list = safeJson(KEY_RECENT,[]);

      if(isExt(it.url)) window.open(it.url,'_blank','noopener'); else window.location.href=it.url;
    });

    /* 설정 모달 */
    document.getElementById('set-close').addEventListener('click', closeSettings);
    settingsBd.addEventListener('click', function(e){ if(e.target===settingsBd) closeSettings(); });
    document.getElementById('set-backup').addEventListener('click', doBackup);

    });
    document.getElementById('set-restore-file').addEventListener('change', function(e){
      var f=e.target.files&&e.target.files[0]; doRestoreFile(f); e.target.value='';
    });
    document.getElementById('set-reset-biz').addEventListener('click', function(){
      if(!confirm('중개업무 바로가기를 기본값으로 초기화할까요?')) return;
      state.biz = seedBiz(); setJson(KEY_BIZ, state.biz);
      renderBiz(); addRecentAction({type:'초기화',text:'중개업무 기본값 복원'});
    });
    document.getElementById('set-reset-content').addEventListener('click', function(){
      if(!confirm('콘텐츠채널 바로가기를 기본값으로 초기화할까요?')) return;
      state.content = seedContent(); setJson(KEY_CONTENT, state.content);
      renderContent(); addRecentAction({type:'초기화',text:'콘텐츠채널 기본값 복원'});
    });

    /* ESC 단축키 */
    document.addEventListener('keydown', function(e){
      if (e.key==='Escape') {
        closeSettings();
        var sr=document.getElementById('search-results');
        if(sr) sr.classList.remove('show');
      }
    });
  }

  /* ── 16. 로딩 바 ────────────────────────────── */
  var loadBar = document.getElementById('loading-bar');
  function setLoad(on) {
    if(on){ loadBar.style.transition='width .35s ease'; loadBar.style.width='65%'; }
    else {
      loadBar.style.width='100%';
      setTimeout(function(){
        loadBar.style.transition='none'; loadBar.style.width='0';
        setTimeout(function(){ loadBar.style.transition='width .35s ease'; },50);
      },300);
    }
  }

  /* ── 17. INIT ───────────────────────────────── */
  function init() {
    state.biz     = loadBiz();
    state.content = loadContent();

    renderHeaderDate();
    renderBiz();
    renderContent();
    renderToday();
    renderRecent();
    bindEvents();

    setLoad(true);
    // 비동기 Supabase 동기화 (실패해도 무방)
    tryLoadFromSB();
    setTimeout(function(){ setLoad(false); }, 1200);
  }

  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();

})();
</script>
</body>
</html>
