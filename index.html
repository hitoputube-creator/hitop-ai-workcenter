<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>하이탑 AI 부동산 업무센터</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
/* ══════════════════════════════════════════
   공용 변수
══════════════════════════════════════════ */
:root{
  --bg-main:#071024;
  --bg-card:#16264d;
  --bg-card-2:#0b1630;
  --panel:#101b34;
  --panel2:#16264d;
  --gold:#d6ad35;
  --gold2:#ffd75a;
  --text-main:#f8fafc;
  --text-muted:#aab7d4;
  --text:#f8fafc;
  --muted:#aab7d4;
  --line:rgba(214,173,53,.42);
  --line-soft:rgba(214,173,53,.18);
  --white:#fff;
  --ink:#172033;
  --danger:#ff7a7a;
  --info:#7dc6ff;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;
  background:linear-gradient(180deg,#101b34,#071024 45%,#050914);
  color:var(--text-main);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

#loading-bar{position:fixed;top:0;left:0;height:2px;width:0;z-index:999;
  background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .35s ease}

.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:22px 0 40px;flex:1}

/* ── HEADER ── */
.header{display:flex;justify-content:space-between;gap:18px;align-items:center;
  border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:14px;min-width:0}
.logo-mark{width:44px;height:44px;border:1px solid var(--line);border-radius:12px;
  display:grid;place-items:center;color:var(--gold2);font-weight:900;
  background:rgba(214,173,53,.12);font-size:14px;flex-shrink:0}
h1{margin:0;font-size:22px;letter-spacing:-1px}
.sub{margin-top:3px;color:var(--text-muted);font-size:12.5px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  font-size:12px;color:var(--text-muted);line-height:1.25}
.header-meta .today-date{color:var(--gold2);font-weight:800;font-size:13.5px;letter-spacing:.2px}
.header-meta .today-day{color:var(--text-muted);font-size:11.5px}

.btn{border:1px solid var(--line);border-radius:999px;background:#0b142c;color:var(--text-main);
  padding:8px 14px;font-weight:800;cursor:pointer;font-size:13px;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--gold2);color:var(--gold2)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border:0}
.btn.gold:hover{filter:brightness(1.06);color:#111827}
.btn.icon-btn{padding:7px 11px;font-size:12px;font-weight:700}
.btn.icon-btn .ico{font-size:12.5px}
.btn.edit-toggle.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border:0}

/* ── SECTION BLOCKS (요약/빠른실행/검색/즐겨찾기/최근작업) ── */
.section-block{margin-top:18px}
.section-block .block-title{display:flex;align-items:center;justify-content:space-between;
  margin:0 0 10px;font-size:13px;color:var(--gold2);font-weight:800;letter-spacing:.3px}
.section-block .block-title .hint{color:var(--text-muted);font-size:11px;font-weight:600}

.summary-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.summary-card{position:relative;border:1px solid var(--line-soft);
  border-radius:14px;background:linear-gradient(145deg,#152444,#0b1731);
  padding:12px 14px;display:flex;flex-direction:column;gap:4px;transition:.15s}
.summary-card:hover{border-color:var(--gold2);transform:translateY(-1px)}
.summary-card .label{font-size:11.5px;color:var(--text-muted);font-weight:700;letter-spacing:.2px}
.summary-card .num{font-size:24px;font-weight:900;color:var(--gold2);letter-spacing:-.5px;line-height:1.1}
.summary-card .unit{font-size:11px;color:var(--text-muted);font-weight:700;margin-left:2px}

.quick-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.quick-btn{border:1px solid var(--line);border-radius:999px;
  background:rgba(214,173,53,.08);color:var(--gold2);
  padding:11px 14px;font-size:13px;font-weight:800;cursor:pointer;
  font-family:inherit;transition:.15s;text-align:center;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quick-btn:hover{background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111827;border-color:transparent;transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(214,173,53,.18)}

/* ── SEARCH ── */
.search-wrap{position:relative}
.search-input{width:100%;background:#0b142c;border:1px solid var(--line);border-radius:14px;
  color:var(--text-main);font-size:14px;font-family:inherit;
  padding:13px 18px 13px 44px;outline:none;transition:.15s}
.search-input:focus{border-color:var(--gold2);background:#0d1730}
.search-input::placeholder{color:#5e6c8a}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);
  color:var(--gold2);font-size:15px;pointer-events:none}
.search-results{display:none;margin-top:8px;background:linear-gradient(145deg,#162644,#0c1932);
  border:1px solid var(--line);border-radius:12px;overflow:hidden;
  max-height:280px;overflow-y:auto}
.search-results.show{display:block}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid rgba(214,173,53,.08);cursor:pointer;transition:.15s}
.search-result-item:last-child{border-bottom:0}
.search-result-item:hover{background:rgba(214,173,53,.08)}
.search-result-item .r-icon{font-size:16px;flex-shrink:0}
.search-result-item .r-body{flex:1;min-width:0}
.search-result-item .r-title{font-size:13px;font-weight:800;color:var(--text-main);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-item .r-meta{font-size:11px;color:var(--text-muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-empty{padding:14px;color:var(--text-muted);font-size:12.5px;text-align:center}

/* ── FAVORITES ── */
.fav-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.fav-card{position:relative;border:1px solid var(--line-soft);border-radius:14px;
  background:linear-gradient(145deg,#172a52,#0c1a36);
  padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s}
.fav-card:hover{border-color:var(--gold2);transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.25)}
.fav-card .star{font-size:11px;color:var(--gold2);position:absolute;top:6px;right:8px;opacity:.85}
.fav-card .f-icon{font-size:20px}
.fav-card .f-title{font-size:13.5px;font-weight:800;color:var(--text-main);letter-spacing:-.2px}
.fav-empty{grid-column:1/-1;border:1px dashed var(--line-soft);border-radius:14px;
  padding:18px;text-align:center;color:var(--text-muted);font-size:12.5px}

/* ── SECTIONS (카테고리) ── */
section.cat{padding-top:14px}
section.cat+section.cat{margin-top:6px;border-top:1px solid rgba(214,173,53,.1)}
section.cat.dragging{opacity:.3;pointer-events:none}
section.cat.drag-over{outline:2px dashed var(--gold);outline-offset:4px;border-radius:12px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin:14px 0 12px;gap:8px}
.sec-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.drag-handle{color:var(--text-muted);font-size:14px;cursor:grab;user-select:none;letter-spacing:-3px;
  opacity:0;transition:opacity .15s;flex-shrink:0;padding:2px 4px;border-radius:4px}
.section-header:hover .drag-handle{opacity:.55}
.drag-handle:hover{opacity:1!important;color:var(--gold2)}
.drag-handle:active{cursor:grabbing}
.sec-title{margin:0;font-size:15px;color:var(--gold2);font-weight:800;letter-spacing:.2px;
  cursor:default;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  border-bottom:1px dashed transparent;transition:border-color .15s}
.section-header:hover .sec-title{border-bottom-color:rgba(255,215,90,.25)}
.sec-title-hint{font-size:10px;color:transparent;transition:color .15s;white-space:nowrap;flex-shrink:0}
.section-header:hover .sec-title-hint{color:var(--text-muted)}
.sec-edit-input{background:#0b142c;border:1px solid var(--gold2);border-radius:8px;
  color:var(--gold2);font-size:15px;font-weight:800;font-family:inherit;
  padding:3px 8px;outline:none;width:200px;max-width:50vw}
.sec-delete{opacity:0;transition:opacity .15s;background:transparent;border:none;
  color:var(--danger);font-size:12px;cursor:pointer;padding:3px 6px;
  border-radius:4px;flex-shrink:0;line-height:1}
.section-header:hover .sec-delete{opacity:1}
body.edit-mode .sec-delete{opacity:.85}
.sec-delete:hover{background:rgba(255,122,122,.12)}
.add-btn{border:1px solid var(--line);background:rgba(214,173,53,.08);color:var(--gold2);
  font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px;
  cursor:pointer;font-family:inherit;transition:.15s;flex-shrink:0;opacity:.7}
.add-btn:hover{background:rgba(214,173,53,.22);border-color:var(--gold2);opacity:1}
body.edit-mode .add-btn{opacity:1;background:rgba(214,173,53,.18)}

.add-section-wrap{padding:18px 0 6px;text-align:center}
.add-section-btn{background:transparent;border:1px dashed rgba(214,173,53,.28);color:var(--text-muted);
  border-radius:12px;padding:10px 36px;font-size:13px;font-weight:800;
  cursor:pointer;font-family:inherit;transition:.15s}
.add-section-btn:hover{border-color:var(--gold2);color:var(--gold2);background:rgba(214,173,53,.06)}

/* ── CARDS ── */
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{position:relative;border:1px solid rgba(214,173,53,.28);border-radius:14px;
  background:linear-gradient(145deg,#16264d,#0b1630);
  padding:14px 14px 12px;min-height:128px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  text-align:center;cursor:pointer;
  transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;
  user-select:none}
.card:hover{transform:translateY(-2px);border-color:var(--gold2);
  background:linear-gradient(145deg,#1d3263,#10204a);box-shadow:0 10px 24px rgba(0,0,0,.3)}
.card .icon{font-size:26px;line-height:1;margin-top:2px}
.card h3{margin:0;font-size:13px;font-weight:800;letter-spacing:-.2px;color:var(--text-main);word-break:keep-all}
.card .desc{margin:0;font-size:11px;color:var(--text-muted);line-height:1.4;
  word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-edit,.card-delete{position:absolute;top:6px;
  width:24px;height:24px;border-radius:50%;font-size:11px;line-height:1;
  cursor:pointer;font-family:inherit;
  display:none;align-items:center;justify-content:center;padding:0}
.card-edit{right:6px;background:rgba(0,0,0,.25);border:1px solid var(--line-soft);color:var(--gold2)}
.card-delete{left:6px;background:rgba(255,122,122,.18);border:1px solid rgba(255,122,122,.45);color:var(--danger);width:22px;height:22px}
body.edit-mode .card-edit,body.edit-mode .card-delete{display:inline-flex}
.card-edit:hover{background:rgba(214,173,53,.22);border-color:var(--gold2)}
.card-delete:hover{background:rgba(255,122,122,.32)}
.card .star-mark{position:absolute;top:6px;right:6px;color:var(--gold2);font-size:11px;opacity:0}
.card.fav .star-mark{opacity:.85}
body.edit-mode .card .star-mark{opacity:0}

/* Card badge */
.card-badge{position:absolute;top:8px;right:34px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;
  font-size:10.5px;font-weight:900;border-radius:999px;padding:2px 7px;
  letter-spacing:.2px;line-height:1.4;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.card-badge.muted{background:rgba(214,173,53,.18);color:var(--gold2);box-shadow:none}
body.edit-mode .card-badge{display:none}

/* ── RECENT ── */
.recent-list{border:1px solid var(--line-soft);border-radius:14px;
  background:linear-gradient(145deg,#152444,#0b1731);overflow:hidden}
.recent-empty{padding:18px;text-align:center;color:var(--text-muted);font-size:13px}
.recent-item{display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-bottom:1px solid rgba(214,173,53,.08)}
.recent-item:last-child{border-bottom:0}
.recent-item .r-time{font-size:11px;color:var(--text-muted);min-width:90px;flex-shrink:0}
.recent-item .r-type{font-size:11px;color:var(--gold2);font-weight:800;
  background:rgba(214,173,53,.12);padding:2px 8px;border-radius:999px;
  border:1px solid var(--line-soft);flex-shrink:0}
.recent-item .r-text{flex:1;min-width:0;font-size:13px;color:var(--text-main);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-item .r-go{border:1px solid var(--line);background:transparent;color:var(--gold2);
  font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;cursor:pointer;
  font-family:inherit;flex-shrink:0}
.recent-item .r-go:hover{background:rgba(214,173,53,.14)}

.footer{flex-shrink:0;border-top:1px solid var(--line);padding:14px 0;
  color:var(--text-muted);font-size:12px;text-align:center;background:rgba(7,16,36,.6)}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(5,9,20,.75);
  display:none;align-items:center;justify-content:center;
  z-index:200;backdrop-filter:blur(3px);padding:16px}
.modal-backdrop.show{display:flex}
.modal{width:min(480px,100%);background:linear-gradient(145deg,#182746,#0c1932);
  border:1px solid var(--line);border-radius:18px;padding:22px;
  box-shadow:0 40px 100px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto}
.modal.lg{width:min(720px,100%)}
.modal h3{margin:0 0 16px;color:var(--gold2);font-size:17px;letter-spacing:-.3px}
.form-row{margin-bottom:12px}
.form-row.inline{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.form-row label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:800;letter-spacing:.2px}
.form-row.inline label{margin-bottom:0;display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  font-size:12.5px;color:var(--text-main)}
.form-row.inline input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold2);cursor:pointer}
.modal input[type=text],.modal input[type=url],.modal input[type=file],.modal select,.modal textarea{
  width:100%;background:#0b142c;border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;color:var(--text-main);font-size:13.5px;font-family:inherit;
  outline:none;transition:border-color .15s}
.modal textarea{resize:vertical;min-height:60px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--gold2)}
.modal input::placeholder,.modal textarea::placeholder{color:#5e6c8a}
.modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px}
.modal-actions .m-right{display:flex;gap:8px;margin-left:auto}
.modal button{font-family:inherit;border-radius:999px;padding:9px 18px;font-weight:800;font-size:13px;cursor:pointer;border:1px solid transparent;transition:.15s}
.m-cancel{background:transparent;border-color:var(--line);color:var(--text-muted)}
.m-cancel:hover{color:var(--text-main);border-color:var(--gold2)}
.m-save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111827;border:0}
.m-save:hover{filter:brightness(1.06)}
.m-delete{background:transparent;border:1px solid rgba(255,122,122,.4);color:var(--danger)}
.m-delete:hover{background:rgba(255,122,122,.12)}
.m-delete.hidden{display:none}

/* Settings modal table */
.settings-section{margin-bottom:18px}
.settings-section h4{margin:0 0 8px;font-size:13px;color:var(--gold2);font-weight:800;letter-spacing:.2px}
.settings-actions{display:flex;gap:8px;flex-wrap:wrap}
.settings-actions button{font-family:inherit;border-radius:999px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer;
  border:1px solid var(--line);background:rgba(214,173,53,.08);color:var(--gold2);transition:.15s}
.settings-actions button:hover{background:rgba(214,173,53,.2);border-color:var(--gold2)}
.settings-actions button.danger{border-color:rgba(255,122,122,.4);color:var(--danger);background:transparent}
.settings-actions button.danger:hover{background:rgba(255,122,122,.12)}
.shortcut-table{width:100%;border-collapse:collapse;font-size:12.5px}
.shortcut-table th,.shortcut-table td{padding:8px 10px;text-align:left;
  border-bottom:1px solid rgba(214,173,53,.1);vertical-align:middle}
.shortcut-table th{color:var(--gold2);font-weight:800;font-size:11.5px;letter-spacing:.3px;
  background:rgba(214,173,53,.06);position:sticky;top:0;z-index:1}
.shortcut-table tr:hover td{background:rgba(214,173,53,.04)}
.shortcut-table .url-input{width:100%;background:#0b142c;border:1px solid var(--line);border-radius:8px;
  padding:6px 10px;color:var(--text-main);font-size:12px;font-family:inherit;outline:none}
.shortcut-table .url-input:focus{border-color:var(--gold2)}
.shortcut-table .row-edit{border:1px solid var(--line);background:transparent;color:var(--gold2);
  font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;cursor:pointer;font-family:inherit}
.shortcut-table .row-edit:hover{background:rgba(214,173,53,.14)}
.shortcut-table .cell-name{font-weight:800;color:var(--text-main)}
.shortcut-table .cell-cat{color:var(--text-muted);font-size:11.5px}
.shortcut-scroll{max-height:300px;overflow-y:auto;border:1px solid var(--line-soft);border-radius:10px}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .header{align-items:flex-start;gap:10px}
  .header-right{width:100%;justify-content:flex-start}
  .summary-grid{grid-template-columns:repeat(3,1fr)}
  .quick-grid{grid-template-columns:repeat(3,1fr)}
  .fav-grid{grid-template-columns:repeat(3,1fr)}
  .grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:767px){
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .quick-grid{grid-template-columns:repeat(2,1fr)}
  .fav-grid{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .wrap{width:calc(100% - 22px);padding-top:18px}
  h1{font-size:18px}
  .sub{font-size:11.5px}
  .header-meta{align-items:flex-start}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .quick-grid{grid-template-columns:1fr 1fr}
  .fav-grid{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:repeat(2,1fr)}
  .summary-card .num{font-size:20px}
  .recent-item{flex-wrap:wrap}
  .recent-item .r-time{min-width:auto}
  .modal{padding:18px}
}
</style>
</head>
<body>
<div id="loading-bar"></div>

<div class="wrap">

  <!-- ═══ 1. HEADER ═══ -->
  <header class="header">
    <div class="logo">
      <div class="logo-mark">HT</div>
      <div>
        <h1>하이탑 AI 부동산 업무센터</h1>
        <div class="sub">매일 업무 시작 — 하나의 컨트롤타워</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-meta">
        <span class="today-date" id="today-date">--</span>
        <span class="today-day"  id="today-day">--</span>
      </div>
      <button type="button" class="btn icon-btn" id="btn-search-focus" title="전체 검색"><span class="ico">🔍</span>전체검색</button>
      <button type="button" class="btn icon-btn" id="btn-backup"       title="데이터 백업"><span class="ico">💾</span>백업</button>
      <button type="button" class="btn icon-btn" id="btn-settings"     title="설정"><span class="ico">⚙️</span>설정</button>
      <button type="button" class="btn icon-btn edit-toggle" id="btn-edit-mode" title="대시보드 편집"><span class="ico">✏️</span>대시보드 편집</button>
      <button type="button" class="btn gold" id="btn-property-manage">매물관리 바로가기</button>
    </div>
  </header>

  <!-- ═══ 2. 오늘 업무 요약 ═══ -->

  // 오늘 업무 요약
  var SUMMARY_DEFS = [
    { key:'today_schedule',  label:'오늘 일정',     unit:'건' },

    { key:'contract_active', label:'계약 진행',     unit:'건' }
  ];

  // 시드 바로가기 (최초 진입 시 + 초기화 시 사용)
  function seedShortcuts() {
    return [
      // 콘텐츠 바로가기
      { id:'sc-youtube',   title:'하이탑부동산TV',  description:'유튜브 콘텐츠 관리 및 영상 아이디어 정리', icon:'📺', url: LINKS.youtube, category:'콘텐츠 바로가기', favorite:false, openInNewTab:true,  badge:'' },
      { id:'sc-blog',      title:'하이탑 블로그',   description:'블로그 글감, 원고, 발행 자료 관리',         icon:'✍️', url: LINKS.blog,    category:'콘텐츠 바로가기', favorite:false, openInNewTab:false, badge:'' },
      { id:'sc-cafe',      title:'하이탑 카페',     description:'네이버 카페 운영 및 홍보 자료 관리',         icon:'☕', url: LINKS.cafe,    category:'콘텐츠 바로가기', favorite:false, openInNewTab:false, badge:'' },
      // 중개 실무 도구
      { id:'sc-contract',  title:'계약문자',        description:'계약 관련 문자 작성 및 발송용 문구 관리',     icon:'📩', url: LINKS.contractMessage, category:'중개 실무 도구', favorite:true,  openInNewTab:false, badge:'대기 0' },
      { id:'sc-broker',    title:'중개보수',        description:'중개보수 계산 및 안내자료 확인',             icon:'🧾', url: LINKS.brokerageFee,    category:'중개 실무 도구', favorite:false, openInNewTab:false, badge:'' },
      { id:'sc-quote',     title:'수익률 견적서',   description:'임대수익률과 투자수익 계산 자료 작성',        icon:'📊', url: LINKS.estimate,        category:'중개 실무 도구', favorite:false, openInNewTab:false, badge:'' },
      { id:'sc-estimate',  title:'견적서',          description:'간단 견적서 작성 및 출력',                   icon:'📑', url: LINKS.estimateGeneral, category:'중개 실무 도구', favorite:false, openInNewTab:false, badge:'' },
      // 관리 시스템
      { id:'sc-realty',    title:'매물관리',        description:'매물 등록, 검색, 수정, 거래완료 관리',         icon:'🏢', url: LINKS.propertyManage, category:'관리 시스템', favorite:true,  openInNewTab:true,  badge:'신규 0' },
      { id:'sc-calendar',  title:'캘린더',          description:'일정, 방문예약, 계약일정 관리',                icon:'📅', url: LINKS.calendar,       category:'관리 시스템', favorite:true,  openInNewTab:false, badge:'오늘 0' },
      { id:'sc-journal',   title:'업무일지노트',    description:'상담기록, 소유주 통화, 오늘 업무 메모 관리',    icon:'📝', url: LINKS.workDiary,      category:'관리 시스템', favorite:true,  openInNewTab:false, badge:'미완료 0' }
    ];
  }

  /* ══════════════════════════════════════════
     2. SUPABASE (sections only)
  ══════════════════════════════════════════ */
  var SB_URL = 'https://xaxbkdnrzsghsabkdvzj.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhheGJrZG5yenNnaHNhYmtkdnpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjc5NTIsImV4cCI6MjA4OTY0Mzk1Mn0.l27ZYQHLt48p7EQrZ8gbAOmJHvCfIur84CtgoWlA8Wg';
  function sbFetch(path, method, body, extra) {
    var h = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
    if (extra) Object.assign(h, extra);
    var opt = { method: method || 'GET', headers: h };
    if (body !== undefined && body !== null) opt.body = JSON.stringify(body);
    return fetch(SB_URL + path, opt).then(function (r) {
      if (!r.ok) return r.text().then(function (t) { throw new Error(t); });
      if (r.status === 204) return null;
      return r.json();
    });
  }
  function apiFetchSections() { return sbFetch('/rest/v1/sections?select=*&order=order_index.asc'); }
  function apiCreateSection(name, orderIndex) {
    return sbFetch('/rest/v1/sections', 'POST', { name: name, order_index: orderIndex }, { 'Prefer': 'return=representation' });
  }
  function apiRenameSection(id, name) { return sbFetch('/rest/v1/sections?id=eq.' + id, 'PATCH', { name: name }); }
  function apiDeleteSection(id) { return sbFetch('/rest/v1/sections?id=eq.' + id, 'DELETE'); }
  function apiReorder(sections) {
    return Promise.all(sections.map(function (s, i) {
      return sbFetch('/rest/v1/sections?id=eq.' + s.id, 'PATCH', { order_index: i });
    })).catch(function (e) { console.warn('reorder DB error:', e); });
  }

  /* ══════════════════════════════════════════
     3. HELPERS
  ══════════════════════════════════════════ */
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function normUrl(u) {
    u = String(u || '').trim();
    if (!u || u === '#') return '';
    if (/^(https?:|mailto:|tel:|\/|\.\/|\.\.\/)/i.test(u)) return u;
    return 'https://' + u;
  }
  function isExternalUrl(u) { return /^https?:/i.test(u || ''); }
  function newId() { return 'ws-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7); }
  function safeJson(k, fallback) {
    try { var v = JSON.parse(localStorage.getItem(k)); return v == null ? fallback : v; }
    catch(e) { return fallback; }
  }
  function setJson(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  /* ══════════════════════════════════════════
     4. STATE + DATA LOADING (with migration)
  ══════════════════════════════════════════ */
  var DEFAULT_SECTIONS = DEFAULT_CATEGORIES.map(function(name, i){
    return { id: 'local-' + i, name: name, order_index: i };
  });
  var state = { sections: [], shortcuts: [], editMode: false };

  function getSecCache() { return safeJson(KEY_SECTIONS, []); }
  function setSecCache(s) { setJson(KEY_SECTIONS, s); }

  function loadShortcuts() {
    // 1) 새 키 우선
    var saved = safeJson(KEY_SHORTCUTS, null);
    if (Array.isArray(saved) && saved.length) return saved.map(normalizeShortcut);

    // 2) 구버전 마이그레이션 (hitopDashboardData = { category: [cards] })
    var legacy = safeJson(KEY_LEGACY_CARDS, null);
    var legacyFav = safeJson(KEY_LEGACY_FAV, []);
    var favTitleSet = {};
    if (Array.isArray(legacyFav)) legacyFav.forEach(function(f){ if(f && f.title) favTitleSet[f.title]=true; });

    if (legacy && typeof legacy === 'object') {
      var arr = [];
      Object.keys(legacy).forEach(function(cat){
        (legacy[cat]||[]).forEach(function(c){
          arr.push(normalizeShortcut({
            id: c.id || newId(),
            title: c.title || '제목없음',
            description: c.desc || '',
            icon: c.icon || '📌',
            url: c.url || '',
            category: cat,
            favorite: !!favTitleSet[c.title],
            openInNewTab: isExternalUrl(c.url || ''),
            badge: ''
          }));
        });
      });
      if (arr.length) {
        setJson(KEY_SHORTCUTS, arr);
        return arr;
      }
    }

    // 3) 시드
    var seed = seedShortcuts();
    setJson(KEY_SHORTCUTS, seed);
    return seed;
  }
  function normalizeShortcut(s) {
    s = s || {};
    return {
      id          : s.id || newId(),
      title       : String(s.title || '제목없음'),
      description : String(s.description || ''),
      icon        : s.icon || '📌',
      url         : String(s.url || ''),
      category    : String(s.category || DEFAULT_CATEGORIES[0]),
      favorite    : !!s.favorite,
      openInNewTab: typeof s.openInNewTab === 'boolean' ? s.openInNewTab : isExternalUrl(s.url || ''),
      badge       : String(s.badge || '')
    };
  }
  function saveShortcuts() { setJson(KEY_SHORTCUTS, state.shortcuts); }
  function findShortcut(id) {
    for (var i = 0; i < state.shortcuts.length; i++) if (state.shortcuts[i].id === id) return { idx:i, item: state.shortcuts[i] };
    return null;
  }

  /* ══════════════════════════════════════════
     5. URL CLICK HANDLER  (공용)
  ══════════════════════════════════════════ */
  function openShortcutUrl(item, sourceLabel) {
    var url = (item && item.url || '').trim();
    if (!url || url === '#') {
      console.warn('[hitop] 빈 링크 클릭됨:', item && item.title, item);
      alert('아직 연결 주소가 등록되지 않았습니다. 대시보드 편집에서 링크를 입력해주세요.');
      return false;
    }
    addRecentAction({ type: sourceLabel || '바로가기', text: item.title || url, url: url });
    if (item.openInNewTab) window.open(url, '_blank', 'noopener');
    else window.location.href = url;
    return true;
  }
  function openByLinkKey(key, label) {
    var url = LINKS[key] || '';
    if (!url) {
      console.warn('[hitop] LINKS.' + key + ' 가 비어 있습니다.');
      alert('아직 연결 주소가 등록되지 않았습니다. 설정에서 링크를 입력해주세요.');
      return false;
    }
    addRecentAction({ type: label || '빠른실행', text: label || key, url: url });
    if (isExternalUrl(url)) window.open(url, '_blank', 'noopener');
    else window.location.href = url;
    return true;
  }

  /* ══════════════════════════════════════════
     6. HEADER: 날짜 / 요일
  ══════════════════════════════════════════ */
  function renderHeaderDate() {
    var d = new Date();
    var dayKor = ['일','월','화','수','목','금','토'][d.getDay()];
    var dateStr = d.getFullYear() + '. ' + String(d.getMonth()+1).padStart(2,'0') + '. ' + String(d.getDate()).padStart(2,'0');
    document.getElementById('today-date').textContent = dateStr;
    document.getElementById('today-day').textContent  = dayKor + '요일';
  }

  /* ══════════════════════════════════════════
     7. SUMMARY (오늘 업무 요약)
  ══════════════════════════════════════════ */
  function getSummaryCounts() {
    var saved = safeJson(KEY_SUMMARY, {});
    var out = {};
    SUMMARY_DEFS.forEach(function(s){ out[s.key] = Number(saved[s.key])||0; });
    return out;
  }
  function renderDashboardSummary() {
    var grid = document.getElementById('summary-grid');
    if (!grid) return;
    var counts = getSummaryCounts();
    grid.innerHTML = SUMMARY_DEFS.map(function(s){
      return '<div class="summary-card" data-key="'+esc(s.key)+'">'+
               '<div class="label">'+esc(s.label)+'</div>'+
               '<div><span class="num">'+ (counts[s.key]||0) + '</span><span class="unit"> '+esc(s.unit)+'</span></div>'+
             '</div>';
    }).join('');
  }

  /* ══════════════════════════════════════════
     8. QUICK ACTIONS
  ══════════════════════════════════════════ */
  function renderQuickActions() {
    var grid = document.getElementById('quick-grid');
    if (!grid) return;
    grid.innerHTML = QUICK_ACTIONS.map(function(q,i){
      return '<button type="button" class="quick-btn" data-quick="'+i+'">'+esc(q.label)+'</button>';

  /* ══════════════════════════════════════════
     9. GLOBAL SEARCH
  ══════════════════════════════════════════ */
  function buildSearchIndex() {
    var idx = state.shortcuts.map(function(s){
      return {
        id: s.id, icon: s.icon || '📌', title: s.title || '',
        desc: s.description || '', meta: s.category || '', url: s.url || '',
        openInNewTab: !!s.openInNewTab
      };
    });
    QUICK_ACTIONS.forEach(function(q){
      idx.push({ id:'quick-'+q.linkKey, icon:'⚡', title:q.label, desc:'빠른 실행', meta:'빠른 실행',
                 url: LINKS[q.linkKey] || '', openInNewTab: isExternalUrl(LINKS[q.linkKey]||'') });
    });
    return idx;
  }
  function handleGlobalSearch(q) {
    var box = document.getElementById('search-results');
    if (!box) return;
    q = String(q||'').trim().toLowerCase();
    if (!q) { box.classList.remove('show'); box.innerHTML=''; return; }
    var hits = buildSearchIndex().filter(function(it){
      return (it.title||'').toLowerCase().indexOf(q)>=0
          || (it.desc ||'').toLowerCase().indexOf(q)>=0
          || (it.meta ||'').toLowerCase().indexOf(q)>=0;
    }).slice(0,12);
    if (!hits.length) {
      box.innerHTML = '<div class="search-result-empty">검색 결과 없음</div>';
    } else {
      box.innerHTML = hits.map(function(h){
        return '<div class="search-result-item" data-id="'+esc(h.id)+'" data-url="'+esc(h.url)+'" data-newtab="'+(h.openInNewTab?'1':'0')+'">'+
                 '<div class="r-icon">'+esc(h.icon)+'</div>'+
                 '<div class="r-body">'+
                   '<div class="r-title">'+esc(h.title)+'</div>'+
                   '<div class="r-meta">'+esc(h.meta)+(h.desc?(' · '+esc(h.desc)):'')+'</div>'+
                 '</div></div>';
      }).join('');
    }
    box.classList.add('show');
  }

  /* ══════════════════════════════════════════
     10. FAVORITES  (★ 체크된 카드 자동 반영)
  ══════════════════════════════════════════ */
  function renderFavorites() {
    var grid = document.getElementById('fav-grid');
    if (!grid) return;
    var favs = state.shortcuts.filter(function(s){ return s.favorite; });
    if (!favs.length) {
      grid.innerHTML = '<div class="fav-empty">아직 즐겨찾기가 없습니다. 카드 수정 모달에서 ★ 즐겨찾기를 켜면 여기에 표시됩니다.</div>';
      return;
    }
    grid.innerHTML = favs.map(function(f){
      return '<div class="fav-card" data-fav-id="'+esc(f.id)+'">'+
               '<span class="star">★</span>'+
               '<div class="f-icon">'+esc(f.icon||'📌')+'</div>'+
               '<div class="f-title">'+esc(f.title)+'</div>'+
             '</div>';
    }).join('');
  }

  /* ══════════════════════════════════════════
     11. RECENT ACTIONS
  ══════════════════════════════════════════ */
  function loadRecent() { return safeJson(KEY_RECENT, []); }
  function addRecentAction(a) {
    var list = loadRecent();
    list.unshift({ ts:Date.now(), type:a.type||'작업', text:a.text||'', url:a.url||'' });
    if (list.length > 30) list = list.slice(0,30);
    setJson(KEY_RECENT, list);
    renderRecentActions();
  }
  function fmtTs(ts) {
    var d = new Date(ts);
    var p = function(n){ return String(n).padStart(2,'0'); };
    return p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
  }
  function renderRecentActions() {
    var box = document.getElementById('recent-list');
    if (!box) return;
    var list = loadRecent().slice(0,10);
    if (!list.length) {
      box.innerHTML = '<div class="recent-empty">아직 최근 작업 기록이 없습니다.</div>';
      return;
    }
    box.innerHTML = list.map(function(it,i){
      return '<div class="recent-item">'+
               '<div class="r-time">'+esc(fmtTs(it.ts))+'</div>'+
               '<div class="r-type">'+esc(it.type||'작업')+'</div>'+
               '<div class="r-text">'+esc(it.text||'')+'</div>'+
               (it.url ? '<button type="button" class="r-go" data-recent-go="'+i+'">이동</button>' : '')+
             '</div>';
    }).join('');
  }

  /* ══════════════════════════════════════════
     12. SECTIONS / CARDS RENDER
  ══════════════════════════════════════════ */
  function categoriesInUse() {
    var seen = {};
    var arr = state.sections.map(function(s){ seen[s.name]=true; return s.name; });
    state.shortcuts.forEach(function(c){
      if (!seen[c.category]) { seen[c.category]=true; arr.push(c.category); }
    });
    return arr;
  }

  function buildCard(item) {
    var el = document.createElement('div');
    el.className = 'card' + (item.favorite ? ' fav' : '');
    el.dataset.id = item.id;
    var badgeHtml = '';
    if (item.badge) {
      var hasNum = /\d+/.test(item.badge);
      var n = hasNum ? parseInt(item.badge.match(/\d+/)[0],10) : 0;
      badgeHtml = '<span class="card-badge '+(n>0?'':'muted')+'">'+esc(item.badge)+'</span>';
    }
    el.innerHTML =
      '<button type="button" class="card-delete" data-del="' + esc(item.id) + '" title="삭제">×</button>' +
      badgeHtml +
      '<button type="button" class="card-edit"   data-edit="'+ esc(item.id) + '" title="수정" aria-label="수정">✏️</button>' +
      (item.favorite ? '<span class="star-mark">★</span>' : '') +
      '<div class="icon">' + esc(item.icon || '📌') + '</div>' +
      '<h3>' + esc(item.title) + '</h3>' +
      (item.description ? '<p class="desc">'+esc(item.description)+'</p>' : '');
    return el;
  }

  function buildSection(sec) {
    var el = document.createElement('section');
    el.className = 'cat';
    el.dataset.secId = sec.id;
    el.draggable = true;
    el.innerHTML =
      '<div class="section-header">' +
        '<div class="sec-left">' +
          '<span class="drag-handle" title="드래그하여 순서 변경" aria-label="순서 변경">⠿⠿</span>' +
          '<h2 class="sec-title" data-sec-id="' + esc(sec.id) + '" data-sec-name="' + esc(sec.name) + '">' + esc(sec.name) + '</h2>' +
          '<span class="sec-title-hint">더블클릭 수정</span>' +
          '<button type="button" class="sec-delete" data-sec-id="' + esc(sec.id) + '" data-sec-name="' + esc(sec.name) + '" title="섹션 삭제">✕</button>' +
        '</div>' +
        '<button type="button" class="add-btn" data-category="' + esc(sec.name) + '">+ 바로가기 추가</button>' +
      '</div>' +
      '<div class="grid" data-category="' + esc(sec.name) + '"></div>';
    return el;
  }

  function ensureSectionsForCategories() {
    // shortcuts 에 있는 카테고리가 sections 에 없으면 로컬로 추가
    var existing = {};
    state.sections.forEach(function(s){ existing[s.name]=true; });
    state.shortcuts.forEach(function(c){
      if (c.category && !existing[c.category]) {
        existing[c.category]=true;
        state.sections.push({ id:'local-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),
                              name: c.category, order_index: state.sections.length });
      }
    });
  }

  function renderCards() {
    state.sections.forEach(function (sec) {
      var grid = document.querySelector('.grid[data-category="' + sec.name + '"]');
      if (!grid) return;
      grid.innerHTML = '';
      state.shortcuts
        .filter(function(c){ return c.category === sec.name; })
        .forEach(function (item) { grid.appendChild(buildCard(item)); });
    });
  }

  function render() {
    ensureSectionsForCategories();
    var container = document.getElementById('sections-container');
    container.innerHTML = '';
    state.sections.forEach(function (sec) { container.appendChild(buildSection(sec)); });
    renderCards();
    renderFavorites();
    bindDrag();
  }

  /* ══════════════════════════════════════════
     13. DRAG & DROP (sections)
  ══════════════════════════════════════════ */
  var dragSrcId = null;
  function bindDrag() {
    document.querySelectorAll('.cat').forEach(function (cat) {
      cat.addEventListener('dragstart',  onDragStart);
      cat.addEventListener('dragend',    onDragEnd);
      cat.addEventListener('dragover',   onDragOver);
      cat.addEventListener('dragleave',  onDragLeave);
      cat.addEventListener('drop',       onDrop);
    });
  }
  function onDragStart(e) {
    if (e.target.closest('.card') || e.target.closest('button') || e.target.closest('input') || e.target.closest('a')) {
      e.preventDefault(); return;
    }
    dragSrcId = this.dataset.secId;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcId);
  }
  function onDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.cat').forEach(function (c) { c.classList.remove('drag-over'); });
  }
  function onDragOver(e) {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    if (this.dataset.secId !== dragSrcId) this.classList.add('drag-over');
  }
  function onDragLeave(e) { if (!this.contains(e.relatedTarget)) this.classList.remove('drag-over'); }
  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    var targetId = this.dataset.secId;
    if (!dragSrcId || dragSrcId === targetId) return;
    var si = state.sections.findIndex(function (s) { return s.id === dragSrcId; });
    var ti = state.sections.findIndex(function (s) { return s.id === targetId; });
    if (si < 0 || ti < 0) return;
    var moved = state.sections.splice(si, 1)[0];
    state.sections.splice(ti, 0, moved);
    setSecCache(state.sections);
    render();
    apiReorder(state.sections);
  }

  /* ══════════════════════════════════════════
     14. SECTION 인라인 이름 수정
  ══════════════════════════════════════════ */
  function activateSecEdit(h2) {
    var secId = h2.dataset.secId, oldName = h2.dataset.secName;
    var inp = document.createElement('input');
    inp.className = 'sec-edit-input'; inp.value = oldName;
    h2.replaceWith(inp); inp.focus(); inp.select();
    var committed = false;
    function commit() {
      if (committed) return; committed = true;
      var newName = inp.value.trim();
      if (!newName || newName === oldName) { cancel(); return; }
      // shortcuts 카테고리도 같이 변경
      state.shortcuts.forEach(function(c){ if (c.category === oldName) c.category = newName; });
      saveShortcuts();
      var sec = state.sections.find(function (s) { return s.id === secId; });
      if (sec) sec.name = newName;
      setSecCache(state.sections);
      render();
      apiRenameSection(secId, newName).catch(function (e) { console.warn('rename error:', e); });
    }
    function cancel() { try { inp.replaceWith(h2); } catch (e) {} }
    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Enter')  { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { committed = true; cancel(); }
    });
    inp.addEventListener('blur', commit);
  }

  var backdrop  = document.getElementById('modal-backdrop');
  var titleEl   = document.getElementById('modal-title');
  var inName    = document.getElementById('m-name');
  var inDesc    = document.getElementById('m-desc');
  var inIcon    = document.getElementById('m-icon');
  var inUrl     = document.getElementById('m-url');
  var inCat     = document.getElementById('m-cat');
  var inNewtab  = document.getElementById('m-newtab');
  var inFav     = document.getElementById('m-fav');
  var inBadge   = document.getElementById('m-badge');
  var btnSave   = document.getElementById('m-save');
  var btnCancel = document.getElementById('m-cancel');
  var btnDelete = document.getElementById('m-delete');
  var rowDesc   = document.getElementById('row-desc');
  var rowIcon   = document.getElementById('row-icon');
  var rowUrl    = document.getElementById('row-url');
  var rowCat    = document.getElementById('row-cat');
  var rowFlags  = document.getElementById('row-flags');
  var rowBadge  = document.getElementById('row-badge');
  var nameLabel = document.getElementById('m-name-label');

  var ms = { mode: 'add-card', category: null, id: null };

  function fillCategoryOptions(selectedName) {
    if (!inCat) return;
    var cats = categoriesInUse();
    DEFAULT_CATEGORIES.forEach(function(c){ if (cats.indexOf(c)<0) cats.push(c); });
    inCat.innerHTML = cats.map(function(n){
      return '<option value="'+esc(n)+'"'+(n===selectedName?' selected':'')+'>'+esc(n)+'</option>';
    }).join('');
  }

  function openModal(mode, opts) {
    opts = opts || {};
    ms.mode = mode; ms.category = opts.category || null; ms.id = opts.id || null;

    if (mode === 'add-section') {
      titleEl.textContent = '새 섹션 추가';
      nameLabel.textContent = '섹션 이름';
      inName.value = ''; inName.placeholder = '예: 콘텐츠 기타이용AI';
      [rowDesc,rowIcon,rowUrl,rowCat,rowFlags,rowBadge].forEach(function(r){ r.style.display='none'; });
      btnDelete.classList.add('hidden');
      btnSave.textContent = '추가';
    } else if (mode === 'add-card') {
      titleEl.textContent = '새 바로가기 추가';
      nameLabel.textContent = '바로가기 이름';
      inName.value = ''; inDesc.value = ''; inIcon.value = ''; inUrl.value = '';
      inNewtab.checked = false; inFav.checked = false; inBadge.value = '';
      [rowDesc,rowIcon,rowUrl,rowCat,rowFlags,rowBadge].forEach(function(r){ r.style.display=''; });
      fillCategoryOptions(opts.category);
      btnDelete.classList.add('hidden');
      btnSave.textContent = '저장';
    } else { // edit-card
      titleEl.textContent = '바로가기 수정';
      nameLabel.textContent = '바로가기 이름';
      var it = opts.item;
      inName.value = it.title || '';
      inDesc.value = it.description || '';
      inIcon.value = it.icon || '';
      inUrl.value  = it.url || '';
      inNewtab.checked = !!it.openInNewTab;
      inFav.checked    = !!it.favorite;
      inBadge.value    = it.badge || '';
      [rowDesc,rowIcon,rowUrl,rowCat,rowFlags,rowBadge].forEach(function(r){ r.style.display=''; });
      fillCategoryOptions(it.category);
      btnDelete.classList.remove('hidden');
      btnSave.textContent = '저장';
    }
    backdrop.classList.add('show');
    backdrop.setAttribute('aria-hidden', 'false');
    setTimeout(function () { inName.focus(); }, 30);
  }

  function closeModal() {
    backdrop.classList.remove('show');
    backdrop.setAttribute('aria-hidden', 'true');
  }

  function saveModal() {
    var nameVal = inName.value.trim();
    if (!nameVal) {
      alert(ms.mode === 'add-section' ? '섹션 이름은 필수입니다.' : '바로가기 이름은 필수입니다.');
      inName.focus(); return;
    }
    if (ms.mode === 'add-section') { closeModal(); doAddSection(nameVal); return; }

    var sc = {
      title: nameVal,
      description: inDesc.value.trim(),
      icon: inIcon.value.trim() || '📌',
      url: normUrl(inUrl.value),
      category: inCat.value || ms.category || DEFAULT_CATEGORIES[0],
      favorite: !!inFav.checked,
      openInNewTab: !!inNewtab.checked,
      badge: inBadge.value.trim()
    };

    if (ms.mode === 'add-card') {
      sc.id = newId();
      state.shortcuts.push(normalizeShortcut(sc));
      addRecentAction({ type:'바로가기 추가', text:sc.title+' ('+sc.category+')', url:sc.url });
    } else {
      var f = findShortcut(ms.id);
      if (f) {
        Object.assign(f.item, sc);
        addRecentAction({ type:'바로가기 수정', text:sc.title, url:sc.url });
      }
    }
    saveShortcuts();
    ensureSectionsForCategories();
    setSecCache(state.sections);
    render();
    closeModal();
  }

  function deleteFromModal() {
    if (ms.mode !== 'edit-card' || !ms.id) return;
    if (!confirm('이 바로가기를 삭제하시겠습니까?')) return;
    var f = findShortcut(ms.id);
    if (f) state.shortcuts.splice(f.idx, 1);
    saveShortcuts();
    render();
    closeModal();
  }

  function deleteCardById(id) {
    var f = findShortcut(id);
    if (!f) return;
    if (!confirm('이 바로가기를 삭제하시겠습니까?')) return;
    state.shortcuts.splice(f.idx, 1);
    saveShortcuts();
    render();
  }

  /* ══════════════════════════════════════════
     16. SECTION ADD / DELETE
  ══════════════════════════════════════════ */
  function doAddSection(name) {
    var orderIdx = state.sections.length;
    apiCreateSection(name, orderIdx).then(function (rows) {
      var newSec = (Array.isArray(rows) && rows[0]) || { id:'local-'+Date.now(), name:name, order_index:orderIdx };
      state.sections.push(newSec);
      setSecCache(state.sections);
      render();
    }).catch(function (e) {
      console.warn('createSection error:', e);
      state.sections.push({ id:'local-'+Date.now(), name:name, order_index:orderIdx });
      setSecCache(state.sections);
      render();
    });
  }
  function doDeleteSection(secId, secName) {
    if (!confirm('"'+secName+'" 섹션을 삭제하시겠습니까?\n(섹션 안의 바로가기도 모두 삭제됩니다)')) return;
    state.sections = state.sections.filter(function (s) { return s.id !== secId; });
    state.shortcuts = state.shortcuts.filter(function(c){ return c.category !== secName; });
    saveShortcuts();
    setSecCache(state.sections);
    render();
    apiDeleteSection(secId).catch(function (e) { console.warn('deleteSection error:', e); });
  }

  ══════════════════════════════════════════ */
  function toggleEditMode() {
    state.editMode = !state.editMode;
    document.body.classList.toggle('edit-mode', state.editMode);
    var btn = document.getElementById('btn-edit-mode');
    if (btn) btn.classList.toggle('active', state.editMode);

  /* ══════════════════════════════════════════
     18. BACKUP / RESTORE / RESET
  ══════════════════════════════════════════ */
  function buildBackupPayload() {
    return {
      exported_at: new Date().toISOString(),
      version    : 2,
      shortcuts  : state.shortcuts,
      sections   : state.sections,
      summary    : safeJson(KEY_SUMMARY, {}),
      recent     : safeJson(KEY_RECENT, [])
    };
  }
  function doBackup() {
    var blob = new Blob([JSON.stringify(buildBackupPayload(),null,2)], { type:'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'hitop-workcenter-backup-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    addRecentAction({ type:'백업', text:'대시보드 백업 파일 생성' });
  }
  function doRestoreFromFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.shortcuts)) { alert('올바른 백업 파일이 아닙니다.'); return; }
        if (!confirm('현재 바로가기 데이터를 복원본으로 덮어쓰시겠습니까?')) return;
        state.shortcuts = data.shortcuts.map(normalizeShortcut);
        if (Array.isArray(data.sections) && data.sections.length) {
          state.sections = data.sections;
          setSecCache(state.sections);
        }
        if (data.summary) setJson(KEY_SUMMARY, data.summary);
        if (Array.isArray(data.recent)) setJson(KEY_RECENT, data.recent);
        saveShortcuts();
        renderDashboardSummary(); renderRecentActions(); render();
        renderSettingsTable();
        alert('복원이 완료되었습니다.');
        addRecentAction({ type:'복원', text:'백업 파일에서 복원' });
      } catch(e) { console.error(e); alert('파일을 읽는 중 오류가 발생했습니다.'); }
    };
    reader.readAsText(file);
  }
  function doReset() {
    if (!confirm('대시보드 바로가기를 기본값으로 초기화하시겠습니까? 기존 수정 내용은 삭제됩니다.')) return;
    state.shortcuts = seedShortcuts().map(normalizeShortcut);
    saveShortcuts();
    render(); renderSettingsTable();
    addRecentAction({ type:'초기화', text:'바로가기 기본값으로 복원' });
  }

  /* ══════════════════════════════════════════
     20. EVENT BINDINGS
  ══════════════════════════════════════════ */
  function bindEvents() {
    // 헤더 버튼
    document.getElementById('btn-search-focus').addEventListener('click', function(){
      var inp = document.getElementById('global-search');
      inp.focus(); inp.scrollIntoView({behavior:'smooth', block:'center'});
    });
    document.getElementById('btn-backup').addEventListener('click', doBackup);
    document.getElementById('btn-settings').addEventListener('click', openSettings);
    document.getElementById('btn-edit-mode').addEventListener('click', toggleEditMode);
    document.getElementById('btn-property-manage').addEventListener('click', function(){
      openByLinkKey('propertyManage', '매물관리 바로가기');
    });

    // 빠른 실행
    document.getElementById('quick-grid').addEventListener('click', function(e){
      var b = e.target.closest('.quick-btn'); if(!b) return;
      var q = QUICK_ACTIONS[Number(b.dataset.quick)]; if(!q) return;
      openByLinkKey(q.linkKey, q.label);
    });

    // 통합 검색
    var inp = document.getElementById('global-search');
    inp.addEventListener('input', function(){ handleGlobalSearch(inp.value); });
    inp.addEventListener('focus', function(){ if (inp.value) handleGlobalSearch(inp.value); });
    document.getElementById('search-results').addEventListener('click', function(e){
      var it = e.target.closest('.search-result-item'); if(!it) return;
      var id = it.dataset.id;
      var f = findShortcut(id);
      if (f) { openShortcutUrl(f.item, '검색'); return; }
      // quick action
      var url = it.dataset.url;
      if (url) {
        var newtab = it.dataset.newtab === '1';
        addRecentAction({ type:'검색', text:it.querySelector('.r-title').textContent, url:url });
        if (newtab) window.open(url,'_blank','noopener'); else window.location.href = url;
      } else {
        alert('아직 연결 주소가 등록되지 않았습니다. 설정에서 링크를 입력해주세요.');
      }
    });
    document.addEventListener('click', function(e){
      if (!e.target.closest('.search-wrap')) {
        var sr = document.getElementById('search-results');
        if (sr) sr.classList.remove('show');
      }
    });

    // 즐겨찾기 클릭
    document.getElementById('fav-grid').addEventListener('click', function(e){
      var c = e.target.closest('.fav-card'); if(!c) return;
      var f = findShortcut(c.dataset.favId);
      if (f) openShortcutUrl(f.item, '즐겨찾기');
    });

    // 최근 작업
    document.getElementById('recent-list').addEventListener('click', function(e){
      var b = e.target.closest('[data-recent-go]'); if(!b) return;
      var idx = Number(b.dataset.recentGo);
      var list = loadRecent();
      var it = list[idx]; if (!it || !it.url) return;
      // 외부면 새 창, 내부면 현재 창
      if (isExternalUrl(it.url)) window.open(it.url,'_blank','noopener');
      else window.location.href = it.url;
    });

    // 카드 + 섹션 공용 클릭
    document.addEventListener('click', function (e) {
      var del = e.target.closest('.card-delete');
      if (del) { e.preventDefault(); e.stopPropagation(); deleteCardById(del.dataset.del); return; }

      var editBtn = e.target.closest('.card-edit');
      if (editBtn) {
        e.preventDefault(); e.stopPropagation();
        var f = findShortcut(editBtn.dataset.edit);
        if (f) openModal('edit-card', { id: editBtn.dataset.edit, item: f.item, category: f.item.category });
        return;
      }
      var addBtn = e.target.closest('.add-btn');
      if (addBtn && addBtn.dataset.category) {
        e.preventDefault();
        openModal('add-card', { category: addBtn.dataset.category }); return;
      }
      if (e.target.closest('#add-section-btn')) {
        e.preventDefault();
        openModal('add-section', {}); return;
      }
      var secDel = e.target.closest('.sec-delete');
      if (secDel) {
        e.preventDefault(); e.stopPropagation();
        doDeleteSection(secDel.dataset.secId, secDel.dataset.secName); return;
      }

      // 카드 본체 클릭 → 이동 (편집모드 OFF 일 때만)
      var card = e.target.closest('.card');
      if (card && !state.editMode &&
          !e.target.closest('.card-edit') && !e.target.closest('.card-delete')) {
        var f2 = findShortcut(card.dataset.id);
        if (f2) openShortcutUrl(f2.item, '바로가기');
        return;
      }
    });

    // 섹션 제목 더블클릭
    document.addEventListener('dblclick', function (e) {
      var h2 = e.target.closest('.sec-title');
      if (h2) { e.preventDefault(); activateSecEdit(h2); }
    });

    // 카드 모달 버튼
    btnSave.addEventListener('click', saveModal);
    btnCancel.addEventListener('click', closeModal);
    btnDelete.addEventListener('click', deleteFromModal);
    backdrop.addEventListener('click', function (e) { if (e.target === backdrop) closeModal(); });
    document.addEventListener('keydown', function (e) {
      if (backdrop.classList.contains('show')) {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && (e.target===inName||e.target===inDesc||e.target===inIcon||e.target===inUrl||e.target===inBadge)) {
          e.preventDefault(); saveModal();
        }
      } else if (settingsBackdrop.classList.contains('show')) {
        if (e.key === 'Escape') closeSettings();
      }
    });

    // 설정 모달
    document.getElementById('set-close').addEventListener('click', closeSettings);
    settingsBackdrop.addEventListener('click', function(e){ if (e.target === settingsBackdrop) closeSettings(); });
    document.getElementById('set-backup').addEventListener('click', doBackup);
    document.getElementById('set-reset').addEventListener('click', doReset);
    document.getElementById('set-restore').addEventListener('click', function(){
      document.getElementById('set-restore-file').click();
    });
    document.getElementById('set-restore-file').addEventListener('change', function(e){
      var f = e.target.files && e.target.files[0];
      doRestoreFromFile(f);
      e.target.value = '';
    });
    var settingsTable = document.getElementById('settings-table');
    settingsTable.addEventListener('click', function(e){
      var b = e.target.closest('[data-row-edit]'); if(!b) return;
      var f = findShortcut(b.dataset.rowEdit);
      if (f) {
        closeSettings();
        openModal('edit-card', { id: f.item.id, item: f.item, category: f.item.category });
      }
    });
    // 빠른 URL 수정 (Enter / blur 시 저장)
    settingsTable.addEventListener('change', function(e){
      var inp = e.target.closest('[data-quick-url]'); if(!inp) return;
      var f = findShortcut(inp.dataset.quickUrl); if(!f) return;
      var newUrl = normUrl(inp.value);
      if (f.item.url === newUrl) return;
      f.item.url = newUrl;
      // 외부 URL이면 새 창 기본값 켜기
      if (isExternalUrl(newUrl) && f.item.openInNewTab !== true) f.item.openInNewTab = true;
      saveShortcuts();
      render();
    });
    settingsTable.addEventListener('keydown', function(e){
      if (e.key === 'Enter' && e.target.matches('[data-quick-url]')) {
        e.preventDefault(); e.target.blur();
      }
    });
  }

  /* ══════════════════════════════════════════
     21. LOADING BAR
  ══════════════════════════════════════════ */
  var bar = document.getElementById('loading-bar');
  function setLoad(on) {
    if (on) { bar.style.transition = 'width .35s ease'; bar.style.width = '65%'; }
    else {
      bar.style.width = '100%';
      setTimeout(function () {
        bar.style.transition = 'none'; bar.style.width = '0';
        setTimeout(function () { bar.style.transition = 'width .35s ease'; }, 50);
      }, 300);
    }
  }

  /* ══════════════════════════════════════════
     22. INIT
  ══════════════════════════════════════════ */
  function init() {
    state.shortcuts = loadShortcuts();
    var cached = getSecCache();
    state.sections = cached.length ? cached : JSON.parse(JSON.stringify(DEFAULT_SECTIONS));

    renderHeaderDate();
    renderDashboardSummary();
    renderQuickActions();
    renderRecentActions();
    bindEvents();
    render();

    setLoad(true);
    apiFetchSections().then(function (fresh) {
      setLoad(false);
      if (fresh && Array.isArray(fresh) && fresh.length) {
        state.sections = fresh;
        setSecCache(fresh);
        render();
      }
    }).catch(function (e) {
      setLoad(false);
      console.warn('Supabase fetch failed, using cache/defaults:', e);
    });

    // 빈 LINKS 진단 로그
    Object.keys(LINKS).forEach(function(k){
      if (!LINKS[k]) console.warn('[hitop] LINKS.'+k+' 가 비어 있습니다. (TODO: 실제 주소 입력 필요)');
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
