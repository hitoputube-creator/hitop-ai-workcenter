.sr small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.hl{background:var(--gold2);color:var(--gold)}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 286px;gap:18px;align-items:start}
.main{display:flex;flex-direction:column;gap:14px;min-width:0}
.panel,.side{background:linear-gradient(180deg,rgba(16,31,50,.96),#0f1d2f);border:1px solid rgba(53,81,108,.86);border-radius:12px;box-shadow:0 18px 42px rgba(0,0,0,.14)}
.panel{padding:15px}

.note{font-size:12px;color:var(--muted);margin-top:4px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.core{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.work-item,.tool-item,.pub-row{display:flex;flex-direction:column;gap:6px;min-width:0}
.tile,.small,.pub{border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--txt);display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;cursor:pointer;transition:border-color .15s,background .15s,transform .15s,box-shadow .15s;width:100%}

.small{min-height:46px;padding:0 12px;font-size:13.5px;font-weight:650;background:#14263a}

.name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ext:after{content:"";display:block;width:9px;height:9px;border-top:1.7px solid currentColor;border-right:1.7px solid currentColor;opacity:.65}

.count{font-size:12px;color:var(--muted)}

.pub{min-height:36px;border-color:transparent;border-left:2px solid transparent;background:transparent;color:var(--sub);padding:0 8px;font-size:12.5px;font-weight:650;border-radius:8px}

.accs{display:flex;flex-direction:column;gap:7px}
.acc{border:1px solid var(--line);border-radius:12px;background:#122338;overflow:hidden}

.acc-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}

.acc.open .chev{transform:rotate(225deg)}
.acc-panel{display:none;padding:0 12px 12px}
.acc.open .acc-panel{display:block}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.modal-bg{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{width:min(500px,100%);max-height:90vh;overflow:auto;background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:20px;box-shadow:0 26px 56px rgba(0,0,0,.45)}
.modal h3{margin:0 0 16px;font-size:17px}
.lab{display:block;margin:12px 0 5px;color:var(--sub);font-size:12px;font-weight:800}

.inp:focus{border-color:var(--blue)}
.row{display:flex;align-items:center;gap:8px;margin-top:12px;color:var(--sub);font-size:13px}
.foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.footer{text-align:center;color:var(--muted);font-size:12px;padding-top:4px}
.empty{color:var(--muted);font-size:13px;padding:10px 2px}
.toast{position:fixed;right:18px;bottom:18px;z-index:80;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:10px 12px;font-size:13px;opacity:0;transform:translateY(8px);transition:.18s}

</div>

  rd.onload=function(){try{var d=JSON.parse(rd.result);if(Array.isArray(d.biz)){st.biz=d.biz.map(clean);sv(KB,st.biz)}if(Array.isArray(d.content)){st.content=d.content.map(clean);sv(KC,st.content)}if(Array.isArray(d.userCats)){var x=restoreCats({cats:d.userCats,catOrder:d.userCatOrder||[]});st.cats=x.cats;st.order=x.catOrder;saveCats()}render();toast('복원 완료')}catch(err){alert('파일을 읽을 수 없습니다.')}};
  rd.readAsText(f);e.target.value='';
};
